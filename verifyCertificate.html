<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification | Rajshahi Olympiad Society</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --dark-bg: #020617;         
      --panel-bg: #0b1329;        
      --glass-bg: rgba(11, 19, 41, 0.65); 
      --primary: #00f5ff;       
      --accent: #ffb703;          
      --neon-green: #10b981;      
      --text-light: #f8fafc;      
      --text-muted: #94a3b8;      
      --glass-border: rgba(0, 245, 255, 0.2);
      --card-gradient: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 41, 59, 0.8) 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      background-color: var(--dark-bg); 
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Hind Siliguri', 'Inter', sans-serif;
      background-image: radial-gradient(circle at 50% 10%, #1e1b4b 0%, #020617 70%);
    }

    .verification-container {
      width: 100%;
      max-width: 650px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 40px rgba(0, 245, 255, 0.05);
      text-align: center;
    }

    .logo-zone img { width: 75px; height: 75px; margin-bottom: 12px; filter: drop-shadow(0 0 10px rgba(0,245,255,0.2)); }
    .logo-zone h1 { font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 800; color: #fff; letter-spacing: 1.5px; }
    .logo-zone p { font-family: 'Orbitron', sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); margin-bottom: 35px; opacity: 0.8; }

    .input-group { display: flex; flex-direction: column; text-align: left; margin-bottom: 24px; gap: 10px; }
    .input-group label { font-size: 13.5px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.3px; }
    .input-group label i { margin-right: 6px; color: var(--primary); }
    
    .input-field {
      background: #030712;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px 18px;
      border-radius: 12px;
      color: #fff;
      font-size: 14.5px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-field:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.25);
      background: #090d16;
    }

    .verify-btn {
      width: 100%;
      background: linear-gradient(135deg, #00b4d8 0%, #00f5ff 100%);
      color: #020617;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 25px rgba(0, 245, 255, 0.25);
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }
    .verify-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 245, 255, 0.4);
    }
    .verify-btn:disabled { background: var(--text-muted); cursor: not-allowed; opacity: 0.6; box-shadow: none; }

    /* Premium Result Design */
    .result-zone {
      display: none;
      width: 100%;
      max-width: 650px;
      margin-top: 30px;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .result-card {
      background: var(--card-gradient);
      border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 35px;
      border-radius: 24px;
      position: relative;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      text-align: left;
    }

    .badge-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 20px;
      margin-bottom: 25px;
    }

    .verified-badge {
      background: rgba(16, 185, 129, 0.1);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 30px;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cert-header-title {
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Primary Highlight Banner inside Card */
    .student-hero {
      background: rgba(0, 245, 255, 0.03);
      border-left: 4px solid var(--primary);
      padding: 18px 20px;
      border-radius: 0 14px 14px 0;
      margin-bottom: 25px;
    }
    .hero-name-bn { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .hero-name-en { font-family: 'Inter', sans-serif; font-size: 15px; color: var(--text-muted); font-weight: 500; margin-bottom: 12px; }
    
    .hero-meta-grid { display: flex; gap: 24px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; }
    .meta-box { display: flex; flex-direction: column; gap: 4px; }
    .meta-label { font-size: 11.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .meta-value { font-family: 'Orbitron', 'Inter', sans-serif; font-size: 14.5px; font-weight: 600; color: var(--accent); }

    /* Elegant Grid Layout for Details */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    
    .info-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 14px 18px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .info-item-label {
      font-size: 12.5px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-item-label i { color: var(--primary); font-size: 13px; width: 16px; text-align: center; }
    .info-item-value { font-size: 14.5px; color: #e2e8f0; font-weight: 500; padding-left: 24px; }

    @keyframes fadeInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 600px) {
      .verification-container, .result-card { padding: 25px 20px; }
      .info-grid { grid-template-columns: 1fr; gap: 14px; }
      .hero-meta-grid { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

  <div class="verification-container">
    <div class="logo-zone">
      <img src="https://ros-admin.github.io/Rajshahi-Olimpiad-Society/ros%20logo%20transparent.png" alt="ROS Logo">
      <h1>RAJSHAHI OLYMPIAD SOCIETY</h1>
      <p>Verification Hub</p>
    </div>

    <form id="publicVerifyForm">
      <div class="input-group">
        <label for="certNo"><i class="fas fa-id-card"></i> সার্টিফিকেট নাম্বার (Certificate Number)</label>
        <input type="text" id="certNo" class="input-field" placeholder="যেমন: ROS-618441" required autocomplete="off">
      </div>

      <div class="input-group">
        <label for="issueDate"><i class="fas fa-calendar-check"></i> ইস্যুর তারিখ (Date of Issue)</label>
        <input type="date" id="issueDate" class="input-field" required>
      </div>

      <button type="submit" id="submitBtn" class="verify-btn">
        <i class="fas fa-shield-halved"></i> সার্টিফিকেট ভেরিফাই করুন
      </button>
    </form>
  </div>

  <div id="resultZone" class="result-zone">
    <div class="result-card">
      
      <div class="badge-container">
        <div class="cert-header-title"><i class="fas fa-file-invoice"></i> Official Record Details</div>
        <div class="verified-badge"><i class="fas fa-badge-check"></i> Verified Record</div>
      </div>

      <div class="student-hero">
        <div id="resBanglaName" class="hero-name-bn">—</div>
        <div id="resEnglishName" class="hero-name-en">—</div>
        
        <div class="hero-meta-grid">
          <div class="meta-box">
            <span class="meta-label"><i class="fas fa-fingerprint"></i> Certificate No</span>
            <span id="resCertNo" class="meta-value" style="color: var(--primary);">—</span>
          </div>
          <div class="meta-box">
            <span class="meta-label"><i class="fas fa-user-vcard"></i> Member ID (UID)</span>
            <span id="resMemberId" class="meta-value">—</span>
          </div>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-item">
          <span class="info-item-label"><i class="fas fa-user-tie"></i> বাবার নাম</span>
          <span id="resFatherName" class="info-item-value">—</span>
        </div>
        
        <div class="info-item">
          <span class="info-item-label"><i class="fas fa-user-gradient"></i> মায়ের নাম</span>
          <span id="resMotherName" class="info-item-value">—</span>
        </div>

        <div class="info-item">
          <span class="info-item-label"><i class="fas fa-cake-candles"></i> জন্ম তারিখ</span>
          <span id="resBirthDate" class="info-item-value">—</span>
        </div>

        <div class="info-item">
          <span class="info-item-label"><i class="fas fa-calendar-plus"></i> নিবন্ধনের তারিখ</span>
          <span id="resRegDate" class="info-item-value">—</span>
        </div>

        <div class="info-item" style="grid-column: span 2;">
          <span class="info-item-label"><i class="fas fa-calendar-day"></i> সার্টিফিকেট ইস্যুর তারিখ</span>
          <span id="resCertIssueDate" class="info-item-value" style="color: #34d399; font-weight: 600;">—</span>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // সরাসরি আপনার দেওয়া কনফিগারেশন কী
    const firebaseConfig = {
      apiKey: "AIzaSyA8NSt3VP9jnVkzrGKPvNSqbnm7hwL-NqY",
      authDomain: "rajshahi-olimpiad-society.firebaseapp.com",
      projectId: "rajshahi-olimpiad-society",
      storageBucket: "rajshahi-olimpiad-society.firebasestorage.app",
      messagingSenderId: "248298850450",
      appId: "1:248298850450:web:d9e99750eddd9c7b18be4b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const verifyForm = document.getElementById('publicVerifyForm');
    const submitBtn = document.getElementById('submitBtn');
    const resultZone = document.getElementById('resultZone');

    verifyForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const inputCertNo = document.getElementById('certNo').value.trim().toUpperCase();
      const inputDate = document.getElementById('issueDate').value; 

      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ভেরিফিকেশন চলছে...`;
      resultZone.style.display = 'none';

      try {
        const certQuery = query(collection(db, "issued_certificates"), where("certificateNo", "==", inputCertNo));
        const querySnapshot = await getDocs(certQuery);

        if (querySnapshot.empty) {
          alert("❌ ভুল সার্টিফিকেট নাম্বার! ডাটাবেজে এই নাম্বারের কোনো রেকর্ড পাওয়া যায়নি।");
          return;
        }

        let certData = null;
        querySnapshot.forEach(s => { certData = s.data(); });

        const dbIssuedDate = certData.issuedAt?.seconds ? new Date(certData.issuedAt.seconds * 1000) : new Date(certData.issuedAt);
        const year = dbIssuedDate.getFullYear();
        const month = String(dbIssuedDate.getMonth() + 1).padStart(2, '0');
        const day = String(dbIssuedDate.getDate()).padStart(2, '0');
        const dbDateString = `${year}-${month}-${day}`;

        if (inputDate !== dbDateString) {
          alert("⚠️ সার্টিফিকেট নাম্বার সঠিক হলেও, ইস্যুর তারিখটি আমাদের রেকর্ডের সাথে মিলছে না!");
          return;
        }

        let userData = null;
        let userDocId = "";

        const userDocSnap = await getDoc(doc(db, "users", certData.userId));
        if (userDocSnap.exists()) {
          userData = userDocSnap.data();
          userDocId = userDocSnap.id;
        } else {
          const userQuery = query(collection(db, "users"), where("uid", "==", certData.userId));
          const userQuerySnapshot = await getDocs(userQuery);
          if (!userQuerySnapshot.empty) {
            userQuerySnapshot.forEach(u => {
              userData = u.data();
              userDocId = u.id;
            });
          }
        }

        if (!userData) {
          alert("❌ দুঃখিত! সার্টিফিকেটের রেকর্ড আছে কিন্তু ব্যবহারকারীর প্রোফাইল পাওয়া যায়নি।");
          return;
        }

        // UI ডাটা রেন্ডারিং
        document.getElementById('resBanglaName').innerText = userData.banglaName || "উল্লেখ নেই";
        document.getElementById('resEnglishName').innerText = userData.englishName || userData.fullName || "—";
        document.getElementById('resMemberId').innerText = userData.memberId ? userData.memberId.toUpperCase() : userDocId.toUpperCase();
        
        let regDateText = "উল্লেখ নেই";
        if (userData.createdAt) {
          const regDateObj = new Date(userData.createdAt);
          if(!isNaN(regDateObj)) {
            regDateText = regDateObj.toLocaleDateString('bn-BD');
          }
        }
        document.getElementById('resRegDate').innerText = regDateText;
        
        if (userData.dob) {
          const dobObj = new Date(userData.dob);
          document.getElementById('resBirthDate').innerText = !isNaN(dobObj) ? dobObj.toLocaleDateString('bn-BD') : userData.dob;
        } else {
          document.getElementById('resBirthDate').innerText = "উল্লেখ নেই";
        }
        
        document.getElementById('resFatherName').innerText = userData.fatherName || "উল্লেখ নেই";
        document.getElementById('resMotherName').innerText = userData.motherName || "উল্লেখ নেই";
        
        document.getElementById('resCertNo').innerText = certData.certificateNo;
        document.getElementById('resCertIssueDate').innerText = dbIssuedDate.toLocaleDateString('bn-BD') + ` (${certData.language === 'bn' ? 'বাংলা সংস্করণ' : 'English Version'})`;

        resultZone.style.display = 'block';
        resultZone.scrollIntoView({ behavior: 'smooth' });

      } catch (error) {
        console.error("Verification Engine Error:", error);
        alert("ফায়ারবেস ডাটাবেজ কানেকশন এরর! অনুগ্রহ করে আবার চেষ্টা করুন।");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="fas fa-shield-halved"></i> সার্টিফিকেট ভেরিফাই করুন`;
      }
    });
  </script>
</body>
</html>

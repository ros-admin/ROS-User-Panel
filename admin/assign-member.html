<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assign Committee Member</title>
  <link rel="stylesheet" href="../theme.css">
  <style>
    body { margin: 0; padding: 0; display: flex; min-height: 100vh; background-color: var(--dark-bg); }
    .sidebar { width: 240px; background: linear-gradient(180deg, rgba(2, 12, 27, 0.95), rgba(10, 25, 47, 0.9)); border-right: 1px solid rgba(0, 180, 216, 0.2); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 10; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(0, 180, 216, 0.15); text-align: center; }
    .sidebar-menu { list-style: none; padding: 15px 0; margin: 0; display: flex; flex-direction: column; gap: 5px; }
    .sidebar-menu li a { display: block; padding: 12px 20px; color: var(--text-light); text-decoration: none; font-size: 14px; border-left: 3px solid transparent; transition: all 0.3s ease; }
    .sidebar-menu li a:hover, .sidebar-menu li a.active { background: rgba(0, 180, 216, 0.1); color: var(--secondary); border-left-color: var(--secondary); }
    .main-content { margin-left: 240px; flex: 1; padding: 25px; box-sizing: border-box; }
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid rgba(0, 180, 216, 0.2); }
      .main-content { margin-left: 0; padding: 15px; }
      .sidebar-menu { flex-direction: row; flex-wrap: wrap; justify-content: center; padding: 10px; }
      .sidebar-menu li a { padding: 8px 12px; font-size: 12px; border-left: none; border-bottom: 2px solid transparent; }
      .sidebar-menu li a:hover, .sidebar-menu li a.active { border-left-color: transparent; border-bottom-color: var(--secondary); }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h3 style="color: var(--secondary); margin: 0; font-size: 16px;">ROS ERP ADMIN</h3>
      <small style="color: var(--text-muted); font-size: 10px;">Core Control Node</small>
    </div>
    <ul class="sidebar-menu">
      <li><a href="dashboard.html">📊 মেম্বার রিকোয়েস্ট</a></li>
      <li><a href="committee.html" class="active">👥 কমিটি ম্যানেজমেন্ট</a></li>
      <li><a href="treasury.html">💰 ট্রেজারি ও ফান্ড খাতা</a></li>
    </ul>
    <div style="margin-top: auto; padding: 20px; text-align: center;">
      <button id="adminLogoutBtn" class="cyber-btn" style="background: var(--danger); font-size: 11px; padding: 6px 12px; width: auto;">লগআউট</button>
    </div>
  </aside>

  <main class="main-content">
    <header style="margin-bottom: 25px;">
      <h2 style="color: #fff; margin: 0; font-size: 18px;" id="targetCommitteeName">কমিটি লোড হচ্ছে...</h2>
      <p style="color: var(--text-muted); font-size: 12px; margin: 0;">Member Designation Assignment Node</p>
    </header>

    <section class="cyber-card" style="border-color: var(--secondary); padding: 15px; margin-bottom: 20px;">
      <input type="text" id="memberSearchInput" placeholder="মেম্বারের নাম বা আইডি লিখে খুঁজুন..." style="width: 100%; padding: 12px; background: rgba(2,12,27,0.8); border: 1px solid var(--secondary); color: #fff; border-radius: 4px; font-size: 14px;">
    </section>

    <section class="cyber-card" style="border-color: var(--accent);">
      <h3 style="color: var(--accent); font-size: 14px; margin-top: 0; margin-bottom: 15px;">🔍 অনুসন্ধান ফলাফল</h3>
      <div id="searchResultContainer" style="display: flex; flex-direction: column; gap: 12px;">
        <p style="color: var(--text-muted); font-size: 12px;">খুঁজতে টাইপ করা শুরু করুন...</p>
      </div>
    </section>
  </main>

  <script type="module">
    import { db, auth } from '../firebase-config.js';
    import { doc, getDoc, collection, getDocs, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const targetCommitteeName = document.getElementById('targetCommitteeName');
    const memberSearchInput = document.getElementById('memberSearchInput');
    const searchResultContainer = document.getElementById('searchResultContainer');

    // URL কোয়েরি থেকে Committee ID রিড করা
    const urlParams = new URLSearchParams(window.location.search);
    const committeeId = urlParams.get('id');

    let allActiveMembers = [];

    // 🔐 ১. সিকিউরিটি গেটওয়াল এবং রুট ভেরিফিকেশন
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "../login.html"; return; }
      
      const userSnap = await getDoc(doc(db, "users", user.uid));
      if (userSnap.exists() && !["super_admin", "president", "secretary"].includes(userSnap.data().role)) {
        window.location.href = "../login.html";
        return;
      }

      if (!committeeId) {
        alert("কোনো বৈধ কমিটি আইডি পাওয়া যায়নি!");
        window.location.href = "committee.html";
        return;
      }

      loadCommitteeDetails();
      cacheActiveMembers();
    });

    // ২. ফায়ারস্টোর থেকে নির্দিষ্ট কমিটির তথ্য নিয়ে আসা
    async function loadCommitteeDetails() {
      try {
        const comSnap = await getDoc(doc(db, "committees", committeeId));
        if (comSnap.exists()) {
          targetCommitteeName.innerText = `${comSnap.data().committeeName} (${comSnap.data().year})`;
        } else {
          targetCommitteeName.innerText = "কমিটি খুঁজে পাওয়া যায়নি";
        }
      } catch (error) {
        console.error("Error loading committee:", error);
      }
    }

    // ৩. একটিভ মেম্বারদের ডাটা ক্যাশ (Cache) করা
    async function cacheActiveMembers() {
      try {
        const q = query(collection(db, "users"), where("status", "==", "active"));
        const querySnapshot = await getDocs(q);
        allActiveMembers = [];
        querySnapshot.forEach(doc => {
          allActiveMembers.push({ uid: doc.id, ...doc.data() });
        });
      } catch (error) {
        console.error("Error caching members:", error);
      }
    }

    // ৪. ইনপুট টাইপিং এর সাথে লাইভ ফিল্টারিং মেকানিজম
    memberSearchInput.addEventListener('input', (e) => {
      const keyword = e.target.value.toLowerCase().trim();
      searchResultContainer.innerHTML = "";

      if (keyword === "") {
        searchResultContainer.innerHTML = `<p style="color: var(--text-muted); font-size: 12px;">খুঁজতে টাইপ করা শুরু করুন...</p>`;
        return;
      }

      const filtered = allActiveMembers.filter(member => 
        (member.englishName && member.englishName.toLowerCase().includes(keyword)) || 
        (member.memberId && member.memberId.toLowerCase().includes(keyword))
      );

      if (filtered.length === 0) {
        searchResultContainer.innerHTML = `<p style="color: var(--text-muted); font-size: 12px;">কোনো মেম্বার পাওয়া যায়নি!</p>`;
        return;
      }

      filtered.forEach(member => {
        const card = document.createElement('div');
        card.className = "cyber-card"; card.style.margin = "0"; card.style.padding = "10px";
        card.style.background = "rgba(2, 12, 27, 0.5)";
        
        card.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
            <div>
              <h4 style="margin:0; color:#fff; font-size:13px;">${member.englishName}</h4>
              <small style="color:var(--accent); font-size:11px;">ID: ${member.memberId || 'N/A'}</small>
            </div>
            <div style="display:flex; gap:5px; align-items:center;">
              <input type="text" placeholder="পদবী (যেমন: সভাপতি)" id="desig-${member.uid}" style="padding: 6px; font-size:12px; background:#020c1b; border:1px solid rgba(0,180,216,0.3); color:#fff; border-radius:4px; width:110px;">
              <button class="cyber-btn save-desig-btn" data-uid="${member.uid}" style="width:auto; padding:6px 10px; font-size:11px; background:var(--secondary);">Confirm</button>
            </div>
          </div>
        `;
        searchResultContainer.appendChild(card);
      });

      document.querySelectorAll('.save-desig-btn').forEach(btn => {
        btn.addEventListener('click', saveDesignation);
      });
    });

    // ৫. পদবী ডাটাবেজে সাবমিট করা
    async function saveDesignation(e) {
      const memberUid = e.target.getAttribute('data-uid');
      const designationInput = document.getElementById(`desig-${memberUid}`);
      const designationValue = designationInput.value.trim();

      if (designationValue === "") {
        alert("অনুগ্রহ করে পদবীটি লিখুন!");
        return;
      }

      try {
        await updateDoc(doc(db, "users", memberUid), {
          committeeId: committeeId,
          designation: designationValue
        });

        alert("পদবী সফলভাবে কমিটিতে যুক্ত করা হয়েছে!");
        
        designationInput.value = "";
        memberSearchInput.value = "";
        searchResultContainer.innerHTML = `<p style="color: var(--text-muted); font-size: 12px;">খুঁজতে টাইপ করা শুরু করুন...</p>`;
        
        // মেমোরি ডেটা রিফ্রেশ
        cacheActiveMembers();
      } catch (error) {
        alert("পদবী সংরক্ষণে সমস্যা হয়েছে: " + error.message);
      }
    }

    // লগআউট হ্যান্ডলার
    document.getElementById('adminLogoutBtn').addEventListener('click', () => {
      signOut(auth).then(() => { window.location.href = "../login.html"; });
    });
  </script>
</body>
</html>

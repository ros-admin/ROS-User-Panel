<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROS Nexus - Enterprise Admin ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Galada&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --cyber-bg: #030712; --glass-bg: rgba(17, 24, 39, 0.7); --glass-border: rgba(0, 180, 216, 0.2);
      --neon-blue: #00b4d8; --neon-green: #2ec4b6; --neon-yellow: #ffb703; --neon-red: #e63946;
      --text-main: #f3f4f6; --text-muted: #9ca3af;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', 'Orbitron', sans-serif; }
    body { background-color: var(--cyber-bg); color: var(--text-main); min-height: 100vh; display: flex; overflow-x: hidden; }
    
    /* লেআউট আর্কিটেকচার */
    .sidebar { width: 260px; background: var(--glass-bg); border-right: 1px solid var(--glass-border); padding: 25px 15px; display: flex; flex-direction: column; gap: 20px; transition: transform 0.3s ease; z-index: 100; }
    .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar { height: 70px; background: var(--glass-bg); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; }
    .content-area { padding: 30px; flex: 1; overflow-y: auto; }

    /* টাইপোগ্রাফি ও লোগো */
    .brand { display: flex; align-items: center; gap: 10px; color: var(--neon-blue); font-size: 20px; font-weight: 800; letter-spacing: 1px; }
    .brand span { font-family: 'Galada', cursive; color: var(--text-main); font-size: 22px; }

    /* নেভিগেশনাল কিউবস */
    .nav-group { display: flex; flex-direction: column; gap: 8px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; color: var(--text-muted); text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: 600; transition: all 0.2s; border: 1px solid transparent; cursor: pointer; }
    .nav-item:hover, .nav-item.active { color: #fff; background: rgba(0, 180, 216, 0.1); border-color: rgba(0, 180, 216, 0.3); box-shadow: 0 0 15px rgba(0, 180, 216, 0.1); }
    .nav-item i { width: 20px; font-size: 16px; transition: 0.2s; }
    .nav-item:hover i, .nav-item.active i { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }

    /* টপবার ইউজার প্রোফাইল হাব */
    .profile-area { display: flex; align-items: center; gap: 15px; position: relative; }
    .profile-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 6px 12px; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
    .profile-trigger img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--neon-blue); }
    .profile-name { font-size: 13px; font-weight: 600; }
    
    .profile-dropdown { position: absolute; top: 50px; right: 0; background: #0f172a; border: 1px solid var(--glass-border); border-radius: 8px; width: 220px; display: none; flex-direction: column; padding: 8px 0; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 200; }
    .dropdown-item { padding: 10px 20px; font-size: 13px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .dropdown-item:hover { background: rgba(255,255,255,0.03); color: #fff; }

    /* মডাল উইন্ডোজ */
    .cyber-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,7,18,0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-box { background: #0f172a; border: 1px solid var(--glass-border); border-radius: 12px; width: 90%; max-width: 450px; padding: 25px; box-shadow: 0 0 30px rgba(0, 180, 216, 0.2); }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--neon-blue); display: flex; align-items: center; gap: 8px; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .cyber-input { width: 100%; padding: 10px 14px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; color: #fff; font-size: 13px; }
    .cyber-input:focus { outline: none; border-color: var(--neon-blue); }
    
    .btn-submit { width: 100%; padding: 10px; background: linear-gradient(135deg, #0077b6, var(--neon-blue)); border: none; border-radius: 6px; color: #fff; font-weight: 700; cursor: pointer; margin-top: 10px; }

    .menu-toggle { display: none; font-size: 20px; color: var(--text-main); cursor: pointer; }

    @media (max-width: 768px) {
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebarNode">
    <div class="brand">
      <i class="fas fa-project-diagram"></i>
      <span>ROS নেক্সাস</span>
    </div>
    
    <nav class="nav-group">
      <div class="nav-item active" id="menuPassControlLink">
        <i class="fas fa-user-shield"></i> পাসওয়ার্ড কন্ট্রোল
      </div>
      <div class="nav-item" id="menuOtherLogsLink">
        <i class="fas fa-layer-group"></i> অন্যান্য মডিউল
      </div>
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="menu-toggle" id="mobileMenuToggle">
        <i class="fas fa-bars"></i>
      </div>
      
      <div style="font-weight: 600; font-size: 14px; color: var(--neon-blue);">
        ADMIN CONTROL PANEL <span style="color: var(--text-muted); font-weight: 400;">| v2.4</span>
      </div>

      <div class="profile-area">
        <div class="profile-trigger" id="profileTrigger">
          <img id="adminAvatar" src="https://via.placeholder.com/150" alt="Admin">
          <span class="profile-name" id="adminName">Loading...</span>
          <i class="fas fa-chevron-down" style="font-size: 10px; color: var(--text-muted);"></i>
        </div>
        
        <div class="profile-dropdown" id="profileDropdown">
          <div class="dropdown-item" id="openPassModalBtn"><i class="fas fa-key"></i> পাসওয়ার্ড পরিবর্তন</div>
          <div class="dropdown-item" id="adminSignOutBtn" style="color: var(--neon-red);"><i class="fas fa-sign-out-alt"></i> লগআউট করুন</div>
        </div>
      </div>
    </header>

    <section class="content-area" id="adminMainContentRoot">
      </section>
  </main>

  <div class="cyber-modal" id="passwordChangeModal">
    <div class="modal-box">
      <h3 class="modal-title"><i class="fas fa-lock"></i> অ্যাকাউন্ট পাসওয়ার্ড আপডেট</h3>
      <form id="passwordUpdateForm">
        <div class="form-group">
          <label>নতুন পাসওয়ার্ড লিখুন</label>
          <input type="password" id="newPassword" class="cyber-input" required placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>পাসওয়ার্ডটি পুনরায় লিখুন</label>
          <input type="password" id="confirmNewPassword" class="cyber-input" required placeholder="••••••••">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
          <button type="submit" class="btn-submit">আপডেট করুন</button>
          <button type="button" id="closePassModalBtn" class="btn-submit" style="background: #374151;">বন্ধ করুন</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, query, where, getDocs, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    // আপনার এডমিন মডিউলটি ইম্পোর্ট করা হচ্ছে
    import { loadAdminPasswordManagementModule } from './login.js';

    const contentRoot = document.getElementById('adminMainContentRoot');
    const profileTrigger = document.getElementById('profileTrigger');
    const profileDropdown = document.getElementById('profileDropdown');
    const sidebarNode = document.getElementById('sidebarNode');
    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const passwordChangeModal = document.getElementById('passwordChangeModal');

    // মেম্বার সেশন ট্র্যাকিং এবং সিকিউরিটি প্রোটেকশন গার্ড
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "../login.html";
        return;
      }

      try {
        const q = query(collection(db, "users"), where("email", "==", user.email));
        const snap = await getDocs(q);
        
        if (snap.empty) {
          alert("অননুমোদিত অ্যাক্সেস!");
          signOut(auth);
          return;
        }

        const adminData = snap.docs[0].data();
        
        // হেডার প্রোফাইল ইনফো পপুলেট
        document.getElementById('adminName').innerText = adminData.fullName || "Admin Node";
        if (adminData.profileImageUrl || adminData.tempBase64Image) {
          document.getElementById('adminAvatar').src = adminData.profileImageUrl || adminData.tempBase64Image;
        }

        // মডিউল লোড করার সময় সঠিক আর্গুমেন্ট সিকোয়েন্স পাঠানো হলো (যাতে ব্ল্যাঙ্ক স্ক্রিন না আসে)
        loadAdminPasswordManagementModule(contentRoot, db, auth, doc, collection, query, where, getDocs, updateDoc, onSnapshot);

      } catch (err) {
        console.error("Dashboard Boot Error:", err);
      }
    });

    // সাইডবার ডাইনামিক সুইচিং
    document.getElementById('menuPassControlLink').addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      document.getElementById('menuPassControlLink').classList.add('active');
      loadAdminPasswordManagementModule(contentRoot, db, auth, doc, collection, query, where, getDocs, updateDoc, onSnapshot);
    });

    document.getElementById('menuOtherLogsLink').addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      document.getElementById('menuOtherLogsLink').classList.add('active');
      contentRoot.innerHTML = `
        <div style="padding:40px; text-align:center; color:var(--text-muted); border:1px dashed var(--glass-border); border-radius:8px;">
          <i class="fas fa-terminal" style="font-size:24px; color:var(--neon-blue); margin-bottom:10px;"></i>
          <p>এই নোডটি বর্তমানে স্ট্যান্ডবাই মোডে আছে।</p>
        </div>
      `;
    });

    // ড্রপডাউন ও ইউজার ইন্টারফেস ইন্টারেকশন কন্ট্রোল
    profileTrigger.addEventListener('click', (e) => { 
      e.stopPropagation(); 
      profileDropdown.style.display = profileDropdown.style.display === 'flex' ? 'none' : 'flex'; 
    });
    
    document.addEventListener('click', () => { profileDropdown.style.display = 'none'; });
    mobileMenuToggle.addEventListener('click', () => { sidebarNode.classList.toggle('active'); });
    document.getElementById('openPassModalBtn').addEventListener('click', () => passwordChangeModal.style.display = 'flex');
    document.getElementById('closePassModalBtn').addEventListener('click', () => passwordChangeModal.style.display = 'none');
    
    // নিজস্ব একাউন্ট পাসওয়ার্ড আপডেট অ্যাকশন
    document.getElementById('passwordUpdateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPass = document.getElementById('newPassword').value;
      if (newPass !== document.getElementById('confirmNewPassword').value) { 
        alert("পাসওয়ার্ড মিলছে না!"); 
        return; 
      }
      try { 
        await updatePassword(auth.currentUser, newPass); 
        alert("🔒 পাসওয়ার্ড সফলভাবে আপডেট হয়েছে!"); 
        passwordChangeModal.style.display = 'none'; 
        document.getElementById('passwordUpdateForm').reset();
      } catch (err) { 
        alert(err.message); 
      }
    });

    // গ্লোবাল সাইন আউট বাটন
    document.getElementById('adminSignOutBtn').addEventListener('click', () => { 
      if (confirm("লগআউট করবেন?")) { 
        signOut(auth).then(() => { window.location.href = "../login.html"; }); 
      } 
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROS Nexus - Enterprise Admin ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Galada&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --cyber-bg: #030712; --glass-bg: rgba(17, 24, 39, 0.7); --glass-border: rgba(0, 180, 216, 0.2);
      --neon-blue: #00b4d8; --neon-green: #2ec4b6; --neon-yellow: #ffb703; --neon-red: #e63946;
      --text-main: #f3f4f6; --text-muted: #9ca3af;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', 'Orbitron', sans-serif; }
    body { background-color: var(--cyber-bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    .cyber-glass { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
    
    .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; border-bottom: 1px solid var(--glass-border); }
    .mobile-menu-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: #fff; padding: 10px 14px; border-radius: 4px; cursor: pointer; display: none; }
    
    .erp-wrapper { display: flex; flex: 1; position: relative; margin-top: 60px; margin-bottom: 50px; }
    .sidebar-nav { width: 280px; height: calc(100vh - 110px); position: fixed; top: 60px; left: 0; display: flex; flex-direction: column; z-index: 99; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; }
    .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid var(--glass-border); }
    .sidebar-header h2 { font-size: 18px; color: var(--neon-blue); letter-spacing: 1px; text-shadow: 0 0 10px rgba(0, 180, 216, 0.5); }
    .sidebar-menu { list-style: none; padding: 15px 0; }
    .menu-item a { display: flex; align-items: center; padding: 12px 20px; color: var(--text-muted); text-decoration: none; font-size: 14px; border-left: 4px solid transparent; transition: all 0.3s ease; }
    .menu-item a:hover, .menu-item.active a { color: #fff; background: rgba(0, 180, 216, 0.1); border-left-color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
    
    .main-content-node { margin-left: 280px; flex: 1; padding: 30px; min-height: calc(100vh - 110px); transition: all 0.4s ease; overflow-x: auto; }
    .admin-profile-trigger { cursor: pointer; display: flex; align-items: center; gap: 10px; position: relative; }
    .admin-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon-blue); box-shadow: 0 0 10px rgba(0, 180, 216, 0.4); object-fit: cover; }
    .profile-dropdown { position: absolute; top: 50px; right: 0; width: 220px; border-radius: 8px; padding: 10px 0; display: none; flex-direction: column; z-index: 1001; }
    .dropdown-info { padding: 10px 20px; border-bottom: 1px solid var(--glass-border); font-size: 13px; }
    .profile-dropdown a { padding: 10px 20px; color: var(--text-muted); text-decoration: none; font-size: 13px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
    .profile-dropdown a:hover { background: rgba(255,255,255,0.05); color: #fff; }

    /* 🔐 পাসওয়ার্ড পরিবর্তনের সুন্দর সাইবার-গ্লাস পপআপ মডাল স্টাইল */
    .custom-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 10000; }
    .custom-modal-box { width: 100%; max-width: 400px; padding: 25px; border-radius: 12px; border: 1px solid var(--glass-border); position: relative; animation: modalSlideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .modal-close-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; transition: 0.2s; }
    .modal-close-btn:hover { color: var(--neon-red); }
    .modal-form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px; }
    .modal-form-group label { font-size: 13px; color: var(--text-muted); }
    .modal-form-group input { background: rgba(17, 24, 39, 0.9); border: 1px solid var(--glass-border); border-radius: 6px; padding: 10px 12px; color: #fff; font-size: 14px; transition: 0.3s; }
    .modal-form-group input:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 10px rgba(0, 180, 216, 0.3); }
    .modal-submit-btn { width: 100%; padding: 12px; border: none; border-radius: 6px; background: var(--neon-blue); color: #030712; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    .modal-submit-btn:hover { background: #0093b2; box-shadow: 0 0 15px rgba(0, 180, 216, 0.5); }

    @keyframes modalSlideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 992px) { 
      .mobile-menu-btn { display: block; } 
      .sidebar-nav { left: -280px; height: calc(100vh - 60px); top: 60px; } 
      .sidebar-nav.active { left: 0; } 
      .main-content-node { margin-left: 0; padding: 15px; padding-top: 20px; } 
    }
  </style>
</head>
<body id="nexusCoreBody" style="display: none;">

  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      alert("System Alert!\nError: " + message + "\nLine: " + lineno + "\nFile: " + source);
      return false;
    };
  </script>

  <div class="top-bar cyber-glass">
    <button class="mobile-menu-btn" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
    <div style="flex-grow: 1;"></div>
    <div class="admin-profile-trigger" id="profileTrigger">
      <span id="headerAdminRole" style="font-size: 11px; color: var(--neon-green); font-weight: bold;">SECURE NODE</span>
      <img src="../placeholder.png" id="topAdminAvatar" class="admin-avatar">
      <div class="profile-dropdown cyber-glass" id="profileDropdown">
        <div class="dropdown-info"><h4 id="dropAdminName">লোড হচ্ছে...</h4><small id="dropAdminEmail">admin@ros.org</small></div>
        <a href="#" id="openPasswordModalBtn" style="color: var(--neon-yellow);"><i class="fas fa-key"></i> পাসওয়ার্ড পরিবর্তন</a>
        <a href="#" id="adminSignOutBtn" style="color: var(--neon-red);"><i class="fas fa-sign-out-alt"></i> লগআউট</a>
      </div>
    </div>
  </div>

  <div class="erp-wrapper">
    <aside class="sidebar-nav cyber-glass" id="sidebarNode">
      <div class="sidebar-header"><h2>ROS NEXUS ERP</h2><small style="color: var(--text-muted); font-size: 10px;">SYSTEM CONTROL STATION</small></div>
      <ul class="sidebar-menu" id="centralMenuContainer"></ul>
    </aside>
    <main class="main-content-node" id="spaContentRoot"></main>
  </div>

  <div class="custom-modal-overlay" id="passwordChangeModalOverlay">
    <div class="custom-modal-box cyber-glass">
      <button class="modal-close-btn" id="closePasswordModalBtn"><i class="fas fa-times"></i></button>
      <h3 style="font-size: 18px; color: var(--neon-yellow); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
        <i class="fas fa-shield-alt"></i> পাসওয়ার্ড সিকিউরিটি প্যানেল
      </h3>
      <form id="adminPasswordUpdateForm">
        <div class="modal-form-group">
          <label for="modalCurrentPassword">বর্তমান পাসওয়ার্ড</label>
          <input type="password" id="modalCurrentPassword" required placeholder="••••••••">
        </div>
        <div class="modal-form-group">
          <label for="modalNewPassword">নতুন পাসওয়ার্ড</label>
          <input type="password" id="modalNewPassword" required placeholder="সর্বনিম্ন ৬ ডিজিট">
        </div>
        <div class="modal-form-group">
          <label for="modalConfirmPassword">নতুন পাসওয়ার্ড নিশ্চিত করুন</label>
          <input type="password" id="modalConfirmPassword" required placeholder="••••••••">
        </div>
        <button type="submit" class="modal-submit-btn" id="modalSubmitBtn">সংরক্ষণ করুন</button>
      </form>
    </div>
  </div>

  <script src="https://ros-admin.github.io/Rajshahi-Olimpiad-Society/navigation.js"></script>

  <script src="../admin/dashboard.js"></script>
  <script src="../admin/members.js"></script>
  <script src="../admin/committee.js"></script>
  <script src="../admin/comHistory.js"></script>
  <script src="../admin/events.js"></script>
  <script src="../admin/volunteers.js"></script>
  <script src="../admin/attendence.js"></script>
  <script src="../admin/logistics.js"></script>
  <script src="../admin/treasury.js"></script>
  <script src="../admin/documents.js"></script>
  <script src="../admin/notifications.js"></script>
  <script src="../admin/support.js"></script>
  <script src="../admin/idCard.js"></script>
  <script src="../admin/qrVerify.js"></script>
  <script src="../admin/reports.js"></script>
  <script src="../admin/logs.js"></script>
  <script src="../admin/infoUpdateRequest.js"></script>
  
  <script type="module">
    import { db, auth } from '../firebase-config.js';
    import { collection, onSnapshot, doc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, setDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged, signOut, EmailAuthProvider, reauthenticateWithCredential, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const erpModules = [
      { id: 'dashboard', name: '📊 ড্যাশবোর্ড হোম' },
      { id: 'members', name: '👥 সদস্য ম্যানেজমেন্ট' },
      { id: 'committee', name: '🏛️ কমিটি ফরমেশন' },
      { id: 'comHistory', name: '📜 কমিটির ইতিহাস' },
      { id: 'events', name: '📅 ইভেন্ট প্যানেল' },
      { id: 'volunteers', name: '🙋 স্বেচ্ছাসেবক উইং' },
      { id: 'attendance', name: '⏱️ ডিজিটাল উপস্থিতি' },
      { id: 'logistics', name: '📦 লজিস্টিকস ও নোটস' },
      { id: 'treasury', name: '💰 সেন্ট্রাল ট্রেজারি' },
      { id: 'documents', name: '📁 ডকুমেন্ট হাব' },
      { id: 'notifications', name: '🔔 নোটিফিকেশন সেন্টার' },
      { id: 'support', name: '💬 মেসেজ ও সাপোর্ট টিকিট' },
      { id: 'idCards', name: '🪪 মেম্বারশিপ কার্ড জোন' },
      { id: 'qrVerify', name: '🔍 QR কোড ভেরিфикации' },
      { id: 'reports', name: '📈 এন্টারপ্রাইজ রিপোর্টস' },
      { id: 'logs', name: '🔐 সিস্টেম অ্যাক্টিভিটি লগ' },
      { id: 'adminRequests', name: '<i class="fas fa-tasks"></i> তথ্য পরিবর্তনের আবেদন' }
    ];

    const menuContainer = document.getElementById('centralMenuContainer');
    const contentRoot = document.getElementById('spaContentRoot');
    const sidebarNode = document.getElementById('sidebarNode');
    const profileDropdown = document.getElementById('profileDropdown');
    
    // মডাল এলিমেন্টস রেফারেন্স
    const pwdModalOverlay = document.getElementById('passwordChangeModalOverlay');
    const openPwdModalBtn = document.getElementById('openPasswordModalBtn');
    const closePwdModalBtn = document.getElementById('closePasswordModalBtn');
    const pwdForm = document.getElementById('adminPasswordUpdateForm');

    let currentAdminData = null;

    // ⏱️ নিষ্ক্রিয়তা ট্র্যাকার কনফিগারেশন (৩ মিনিট)
    let inactivityTimeout;
    const INACTIVITY_TIME = 3 * 60 * 1000; 

    function triggerAutoLogout() {
      alert("নিষ্ক্রিয়তার কারণে আপনার সেশনটি শেষ হয়ে গেছে। পুনরায় লগইন করুন।");
      signOut(auth).then(() => { window.location.href = "../login.html"; });
    }

    function resetInactivityTimer() {
      clearTimeout(inactivityTimeout);
      if (auth.currentUser) {
        inactivityTimeout = setTimeout(triggerAutoLogout, INACTIVITY_TIME);
      }
    }

    function startTrackingInactivity() {
      window.addEventListener('mousemove', resetInactivityTimer);
      window.addEventListener('keypress', resetInactivityTimer);
      window.addEventListener('scroll', resetInactivityTimer);
      window.addEventListener('click', resetInactivityTimer);
      resetInactivityTimer();
    }

    function stopTrackingInactivity() {
      window.removeEventListener('mousemove', resetInactivityTimer);
      window.removeEventListener('keypress', resetInactivityTimer);
      window.removeEventListener('scroll', resetInactivityTimer);
      window.removeEventListener('click', resetInactivityTimer);
      clearTimeout(inactivityTimeout);
    }

    // অথেনটিকেশন স্টেট প্রসেসর
    onAuthStateChanged(auth, async (user) => {
      if (!user) { 
        stopTrackingInactivity();
        window.location.href = "../login.html"; 
        return; 
      }
      try {
        const adminSnap = await getDoc(doc(db, "users", user.uid));
        if (adminSnap.exists() && ["super_admin", "president", "secretary", "treasurer"].includes(adminSnap.data().role)) {
          currentAdminData = adminSnap.data();
          setupAdminHeaderProfile();
          initSidebarMenu();
          switchModuleView('dashboard'); 
          document.getElementById('nexusCoreBody').style.display = 'flex';
          startTrackingInactivity(); 
        } else {
          alert("অনাধিকার প্রবেশ নিষিদ্ধ!"); window.location.href = "../login.html";
        }
      } catch (err) { console.error(err); }
    });

    function setupAdminHeaderProfile() {
      document.getElementById('headerAdminRole').innerText = currentAdminData.role ? currentAdminData.role.toUpperCase().replace('_', ' ') : 'ADMIN';
      document.getElementById('topAdminAvatar').src = currentAdminData.photoUrl || currentAdminData.profileImageUrl || '../placeholder.png';
      document.getElementById('dropAdminName').innerText = currentAdminData.englishName || currentAdminData.fullName || 'Admin';
      document.getElementById('dropAdminEmail').innerText = auth.currentUser.email;
    }

    function initSidebarMenu() {
      menuContainer.innerHTML = "";
      erpModules.forEach((mod, index) => {
        const li = document.createElement('li');
        li.className = `menu-item ${index === 0 ? 'active' : ''}`;
        li.innerHTML = `<a href="#" data-mod-id="${mod.id}">${mod.name}</a>`;
        menuContainer.appendChild(li);
      });

      document.querySelectorAll('.menu-item a').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          document.querySelectorAll('.menu-item').forEach(li => li.classList.remove('active'));
          link.parentElement.classList.add('active');
          switchModuleView(link.getAttribute('data-mod-id'));
          if (window.innerWidth <= 992) sidebarNode.classList.remove('active');
        });
      });
    }

    function switchModuleView(id) {
      contentRoot.innerHTML = "";

      if (id === 'dashboard') {
        loadDashboardModule(contentRoot, currentAdminData, db, collection, onSnapshot, doc, updateDoc, deleteDoc);
      } 
      else if (id === 'members') {
        loadMembersModule(contentRoot, db, collection, onSnapshot, doc, getDocs, addDoc, updateDoc, deleteDoc);
      } 
      else if (id === 'committee') {
        loadCommitteeModule(contentRoot, db, collection, onSnapshot, doc, getDocs, addDoc, updateDoc, deleteDoc);
      }
      else if (id === 'comHistory') {
        loadComHistoryModule(contentRoot, db, collection, onSnapshot);
      }
      else if (id === 'events') {
        loadEventsModule(contentRoot, db, collection, onSnapshot, doc, addDoc, deleteDoc);
      }
      else if (id === 'volunteers') {
        loadVolunteersModule(contentRoot, db, collection, onSnapshot, doc, getDocs, updateDoc, deleteDoc);
      }
      else if (id === 'attendance') {
        loadAttendanceModule(contentRoot, db, collection, onSnapshot, doc, getDocs, addDoc, updateDoc);
      }
      else if (id === 'logistics') {
        loadLogisticsModule(contentRoot, db, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc);
      }
      else if (id === 'treasury') {
        loadTreasuryModule(contentRoot, db, collection, onSnapshot, doc, addDoc, deleteDoc);
      }
      else if (id === 'documents') {
        loadDocumentsModule(contentRoot, db, collection, onSnapshot, doc, addDoc, deleteDoc);
      }
      else if (id === 'notifications') {
        loadNotificationsModule(contentRoot, db, collection, onSnapshot, doc, addDoc, deleteDoc);
      }
      else if (id === 'support') {
        loadSupportModule(contentRoot, db, collection, onSnapshot, doc, updateDoc, deleteDoc);
      }
      else if (id === 'idCards') {
        loadIdCardsModule(contentRoot, db, collection, onSnapshot, doc, updateDoc);
      }
      else if (id === 'qrVerify') {
        loadQrVerifyModule(contentRoot, db, collection, onSnapshot, doc, getDocs);
      }
      else if (id === 'reports') {
        loadReportsModule(contentRoot, db, collection, onSnapshot, getDocs);
      }
      else if (id === 'logs') {
        loadLogsModule(contentRoot, db, collection, onSnapshot, doc, addDoc, deleteDoc);
      }
      else if (id === 'adminRequests') {
        loadAdminRequestsModule(contentRoot, db, auth, doc, onSnapshot, updateDoc, collection, query, where, serverTimestamp);
      }
      else {
        contentRoot.innerHTML = `
          <div class="cyber-glass" style="padding:40px; text-align:center; border-radius:8px;">
            <i class="fas fa-microchip" style="font-size:40px; color:var(--neon-blue); margin-bottom:15px;"></i>
            <h3>${erpModules.find(m => m.id === id)?.name || 'Unknown Module'}</h3>
            <p style="color:var(--text-muted); font-size:12px; margin-top:8px;">মডিউল ফাইলটি এক্সটার্নাল স্ক্রিপ্ট হিসেবে যুক্ত করার জন্য স্ট্যান্ডবাই মোডে আছে。</p>
          </div>
        `;
      }
    }

    // ─── 🔓 পাসওয়ার্ড মডাল কন্ট্রোল ইভেন্টস ───
    openPwdModalBtn.addEventListener('click', (e) => {
      e.preventDefault();
      profileDropdown.style.display = 'none'; // ড্রপডাউনটি হাইড করা হচ্ছে
      pwdForm.reset();
      pwdModalOverlay.style.display = 'flex'; // মডাল ওপেন
    });

    closePwdModalBtn.addEventListener('click', () => {
      pwdModalOverlay.style.display = 'none'; // মডাল ক্লোজ
    });

    // মডালের বাইরের ব্লাঙ্ক এরিয়াতে ক্লিক করলে ক্লোজ হবে
    pwdModalOverlay.addEventListener('click', (e) => {
      if (e.target === pwdModalOverlay) pwdModalOverlay.style.display = 'none';
    });

    // ─── 🔐 সিকিউর পাসওয়ার্ড আপডেট প্রসেস ───
    pwdForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const currentPass = document.getElementById('modalCurrentPassword').value;
      const newPass = document.getElementById('modalNewPassword').value;
      const confirmPass = document.getElementById('modalConfirmPassword').value;
      const submitBtn = document.getElementById('modalSubmitBtn');

      if (newPass.length < 6) {
        alert("নতুন পাসওয়ার্ডটি অবশ্যই সর্বনিম্ন ৬ ডিজিটের হতে হবে।");
        return;
      }

      if (newPass !== confirmPass) {
        alert("নতুন পাসওয়ার্ড এবং কনফার্ম পাসওয়ার্ড ম্যাচ করেনি!");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = "প্রসেস হচ্ছে...";

      try {
        const user = auth.currentUser;
        if (!user) throw new Error("ইউজার সেশন খুঁজে পাওয়া যায়নি।");

        // ১. রিয়েল-টাইম রি-অথেন্টিকেশন প্রোটোকল
        const credential = EmailAuthProvider.credential(user.email, currentPass);
        await reauthenticateWithCredential(user, credential);
        
        // ২. ফায়ারবেস পাসওয়ার্ড আপডেট
        await updatePassword(user, newPass);
        
        alert("🔒 পাসওয়ার্ড সফলভাবে পরিবর্তিত হয়েছে! নিরাপত্তা রক্ষার্থে নতুন পাসওয়ার্ড দিয়ে আবার লগইন করুন।");
        pwdModalOverlay.style.display = 'none';
        
          // সেশন ডিলিট করে লগইন স্ক্রিনে পাঠানো
        await signOut(auth);
        window.location.href = "../login.html";

      } catch (err) {
        console.error("Password change failure:", err);
        if (err.code === "auth/wrong-password") {
          alert("ভুল বর্তমান পাসওয়ার্ড দিয়েছেন! দয়া করে সঠিক পাসওয়ার্ড লিখুন।");
        } else {
          alert("ত্রুটি: " + err.message);
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "সংরক্ষণ করুন";
      }
    });

    // UI ড্রপডাউন ও সাইডবার ইভেন্ট লিসেনার
    profileTrigger.addEventListener('click', (e) => { 
      e.stopPropagation(); 
      profileDropdown.style.display = profileDropdown.style.display === 'flex' ? 'none' : 'flex'; 
    });
    document.addEventListener('click', () => { profileDropdown.style.display = 'none'; });
    mobileMenuToggle.addEventListener('click', () => { sidebarNode.classList.toggle('active'); });

    // লগআউট প্রোটোকল
    document.getElementById('adminSignOutBtn').addEventListener('click', () => { 
      if (confirm("লগআউট করবেন?")) signOut(auth).then(() => { window.location.href = "../login.html"; }); 
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROS Committee Management</title>
  <link rel="stylesheet" href="../theme.css">
  <style>
    body { margin: 0; padding: 0; display: flex; min-height: 100vh; background-color: var(--dark-bg); }
    .sidebar { width: 240px; background: linear-gradient(180deg, rgba(2, 12, 27, 0.95), rgba(10, 25, 47, 0.9)); border-right: 1px solid rgba(0, 180, 216, 0.2); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 10; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(0, 180, 216, 0.15); text-align: center; }
    .sidebar-menu { list-style: none; padding: 15px 0; margin: 0; display: flex; flex-direction: column; gap: 5px; }
    .sidebar-menu li a { display: block; padding: 12px 20px; color: var(--text-light); text-decoration: none; font-size: 14px; border-left: 3px solid transparent; transition: all 0.3s ease; }
    .sidebar-menu li a:hover, .sidebar-menu li a.active { background: rgba(0, 180, 216, 0.1); color: var(--secondary); border-left-color: var(--secondary); }
    .main-content { margin-left: 240px; flex: 1; padding: 25px; box-sizing: border-box; }
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid rgba(0, 180, 216, 0.2); }
      .main-content { margin-left: 0; padding: 15px; }
      .sidebar-menu { flex-direction: row; flex-wrap: wrap; justify-content: center; padding: 10px; }
      .sidebar-menu li a { padding: 8px 12px; font-size: 12px; border-left: none; border-bottom: 2px solid transparent; }
      .sidebar-menu li a:hover, .sidebar-menu li a.active { border-left-color: transparent; border-bottom-color: var(--secondary); }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h3 style="color: var(--secondary); margin: 0; font-size: 16px;">ROS ERP ADMIN</h3>
      <small style="color: var(--text-muted); font-size: 10px;">Core Control Node</small>
    </div>
    <ul class="sidebar-menu">
      <li><a href="dashboard.html">📊 মেম্বার রিকোয়েস্ট</a></li>
      <li><a href="committee.html" class="active">👥 কমিটি ম্যানেজমেন্ট</a></li>
      <li><a href="treasury.html">💰 ট্রেজারি ও ফান্ড খাতা</a></li>
    </ul>
    <div style="margin-top: auto; padding: 20px; text-align: center;">
      <button id="adminLogoutBtn" class="cyber-btn" style="background: var(--danger); font-size: 11px; padding: 6px 12px; width: auto;">লগআউট</button>
    </div>
  </aside>

  <main class="main-content">
    <header style="margin-bottom: 25px;">
      <h2 style="color: #fff; margin: 0; font-size: 20px;">কমিটি ম্যানেজমেন্ট</h2>
      <p style="color: var(--text-muted); font-size: 12px; margin: 0;">ROS Structure Node</p>
    </header>

    <section class="cyber-card" style="border-color: var(--secondary); margin-bottom: 20px;">
      <h3 style="color: var(--secondary); font-size: 14px; margin-top: 0; margin-bottom: 15px;">🆕 নতুন কমিটি তৈরি করুন</h3>
      <form id="committeeForm" style="display: flex; flex-direction: column; gap: 12px;">
        <input type="text" id="comName" class="cyber-input" placeholder="কমিটির নাম (যেমন: কার্যনির্বাহী কমিটি ২০২৬)" required style="padding: 10px;">
        <input type="text" id="comYear" class="cyber-input" placeholder="মেয়াদ/বছর (উদা: 2026-2027)" required style="padding: 10px;">
        <button type="submit" class="cyber-btn" style="background: linear-gradient(135deg, #4cc9f0, #00b4d8);">কমিটি সক্রিয় করুন</button>
      </form>
    </section>

    <section class="cyber-card" style="border-color: var(--accent);">
      <h3 style="color: var(--accent); font-size: 14px; margin-top: 0; margin-bottom: 15px;">📋 বর্তমান কমিটিসমূহ</h3>
      <div id="committeeListContainer" style="display: flex; flex-direction: column; gap: 12px;">
        <p style="color: var(--text-muted); font-size: 12px;">লোডিং হচ্ছে...</p>
      </div>
    </section>
  </main>

  <script type="module">
    import { db, auth } from '../firebase-config.js';
    import { collection, addDoc, query, orderBy, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const committeeForm = document.getElementById('committeeForm');
    const committeeListContainer = document.getElementById('committeeListContainer');

    // 🔐 সিকিউরিটি গেটওয়াল
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "../login.html"; return; }
      const userSnap = await getDoc(doc(db, "users", user.uid));
      if (userSnap.exists() && !["super_admin", "president", "secretary"].includes(userSnap.data().role)) {
        window.location.href = "../login.html";
      }
    });

    // নতুন কমিটি তৈরি
    committeeForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await addDoc(collection(db, "committees"), {
          committeeName: document.getElementById('comName').value.trim(),
          year: document.getElementById('comYear').value.trim(),
          createdAt: new Date().toISOString(),
          status: "active"
        });
        alert("নতুন কমিটি তৈরি হয়েছে!");
        committeeForm.reset();
      } catch (err) { alert(err.message); }
    });

    // কমিটি লিস্ট লোড
    onSnapshot(query(collection(db, "committees"), orderBy("createdAt", "desc")), (snapshot) => {
      committeeListContainer.innerHTML = snapshot.empty ? `<p style="color: var(--text-muted); font-size: 12px;">কোনো কমিটি নেই।</p>` : "";
      snapshot.forEach(comDoc => {
        const com = comDoc.data();
        const card = document.createElement('div');
        card.className = "cyber-card"; card.style.margin = "0"; card.style.padding = "10px";
        card.style.display = "flex"; card.style.justifyContent = "space-between"; card.style.alignItems = "center";
        card.innerHTML = `
          <div>
            <h4 style="margin: 0; color: #fff; font-size: 13px;">${com.committeeName}</h4>
            <small style="color: var(--accent); font-size: 11px;">মেয়াদ: ${com.year}</small>
          </div>
          <button class="cyber-btn assign-btn" data-id="${comDoc.id}" style="width: auto; padding: 6px 12px; font-size: 11px; background: rgba(0,180,216,0.15);">পদবী দিন</button>
        `;
        committeeListContainer.appendChild(card);
      });
      document.querySelectorAll('.assign-btn').forEach(btn => btn.addEventListener('click', e => {
        window.location.href = `assign-member.html?id=${e.target.getAttribute('data-id')}`;
      }));
    });

    document.getElementById('adminLogoutBtn').addEventListener('click', () => signOut(auth).then(() => window.location.href = "../login.html"));
  </script>
</body>
</html>

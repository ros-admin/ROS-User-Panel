<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROS Safe Login Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.95);
      --neon-cyan: #00b4d8;
      --neon-yellow: #fbbf24;
      --neon-danger: #ff4d6d;
      --text-muted: #9ca3af;
    }

    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: var(--bg-dark);
      font-family: 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* গ্লোয়িং এন্টারপ্রাইজ বক্স কন্টেইনার */
    .app-container {
      max-width: 550px;
      width: 90%;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 180, 216, 0.25);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 0 30px rgba(0, 180, 216, 0.15), inset 0 0 15px rgba(0, 180, 216, 0.05);
      position: relative;
    }

    .app-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--neon-yellow), var(--neon-cyan), transparent);
    }

    /* অর্গানাইজেশন আইডেন্টিটি হাব লেআউট (ডেস্কটপ) */
    .identity-hub {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 20px;
    }

    .org-logo {
      width: 75px;
      height: 75px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 180, 216, 0.4);
      flex-shrink: 0;
    }

    /* ওয়ান-সাইড হলুদ ডিভাইডার টান (ডেস্কটপ: উপর থেকে নিচে) */
    .yellow-divider {
      width: 3px;
      align-self: stretch;
      background: linear-gradient(180deg, transparent, var(--neon-yellow), transparent);
      flex-shrink: 0;
    }

    .header-text-block {
      flex: 1;
    }

    .header-text-block h2 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin: 0 0 5px 0;
      letter-spacing: 0.5px;
    }

    .header-text-block p {
      font-size: 11px;
      color: var(--text-muted);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* ফর্ম গ্রুপ ও প্রিমিয়াম ইনপুট */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #d1d5db;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .cyber-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    .cyber-input:focus {
      outline: none;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(0, 180, 216, 0.3);
      background: rgba(0, 0, 0, 0.5);
    }

    /* নিয়ন সাবমিট বাটন */
    .cyber-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0077b6, var(--neon-cyan));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 180, 216, 0.2);
    }

    .cyber-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 180, 216, 0.4);
    }

    .cyber-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .forgot-link-area {
      text-align: right;
      margin-top: 15px;
    }

    .forgot-link-area a {
      color: var(--text-muted);
      font-size: 12px;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .forgot-link-area a:hover {
      color: var(--neon-yellow);
    }

    /* রিসেট মোডাল স্টাইল */
    .cyber-card {
      margin-top: 25px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--neon-danger);
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(255, 77, 109, 0.15);
      animation: fadeIn 0.4s ease;
    }

    /* ৩ সেকেন্ডে হারানো নোটিফিকেশন টোস্ট পপআপ */
    #notification-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast-popup {
      background: #111827;
      border-left: 4px solid var(--neon-cyan);
      color: #fff;
      padding: 14px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 280px;
      max-width: 400px;
      animation: slideIn 0.3s ease forwards;
    }

    .toast-popup.toast-error { border-left-color: var(--neon-danger); }
    .toast-popup.toast-warning { border-left-color: var(--neon-yellow); }

    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes fadeOut {
      to { transform: translateX(120%); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* মোবাইল স্ক্রিন রেসপন্সিভ মিডিয়া কোয়েরি ফিক্স */
    @media (max-width: 600px) {
      .app-container {
        padding: 25px 20px;
      }
      .identity-hub {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 15px;
      }
      /* মোবাইল: হলুদ টান বাম থেকে ডানে দেখাবে */
      .yellow-divider {
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--neon-yellow), transparent);
      }
      .org-logo {
        width: 70px;
        height: 70px;
      }
      #notification-container {
        left: 20px;
        right: 20px;
      }
      .toast-popup {
        min-width: unset;
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div id="notification-container"></div>

  <div class="app-container">
    <header class="identity-hub">
      <img src="https://ros-admin.github.io/Rajshahi-Olimpiad-Society/ros%20logo.png" alt="ROS Logo" class="org-logo">
      
      <div class="yellow-divider"></div>
      
      <div class="header-text-block">
        <h2>সদস্য লগইন পোর্টাল</h2>
        <p>Secure Node Authentication</p>
      </div>
    </header>

    <form id="loginForm">
      <div class="form-group">
        <label>Email অথবা Member ID *</label>
        <input type="text" id="loginIdentifier" class="cyber-input" required placeholder="ROS-2026-0001 অথবা email@domain.com">
      </div>
      
      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="loginPassword" class="cyber-input" required placeholder="••••••••">
      </div>

      <button type="submit" id="loginBtn" class="cyber-btn">পোর্টালে প্রবেশ করুন</button>
      
      <div class="forgot-link-area">
        <a href="#" id="forgotPasswordLink">পাসওয়ার্ড ভুলে গেছেন?</a>
      </div>
    </form>

    <div id="resetModal" class="cyber-card" style="display: none;">
      <h3 style="color: var(--neon-danger); font-size: 15px; margin: 0 0 15px 0; font-weight: 700; display: flex; align-items: center; gap: 8px;">
        <i class="fas fa-exclamation-triangle"></i> পাসওয়ার্ড রিসেট রিকোয়েস্ট কিউ
      </h3>
      <div class="form-group">
        <label>আপনার Member ID অথবা Mobile Number লিখুন</label>
        <input type="text" id="resetIdentifier" class="cyber-input" placeholder="ROS-2026-0001 / 017XXXXXXXX">
      </div>
      <div style="display: flex; gap: 10px;">
        <button type="button" id="submitResetBtn" class="cyber-btn" style="background: linear-gradient(135deg, #ff4d6d, #c9184a);">রিকোয়েস্ট পাঠান</button>
        <button type="button" id="closeModalBtn" class="cyber-btn" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: #fff;">বন্ধ করুন</button>
      </div>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>

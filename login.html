<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROS Safe Login Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.95);
      --neon-cyan: #00b4d8;
      --neon-yellow: #fbbf24;
      --neon-danger: #ff4d6d;
      --text-muted: #9ca3af;
    }

    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: var(--bg-dark);
      font-family: 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app-container {
      max-width: 550px;
      width: 90%;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 180, 216, 0.2);
      border-radius: 16px;
      padding: 35px 25px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 180, 216, 0.1);
      position: relative;
    }

    .app-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-yellow), transparent);
    }

    .cyber-card {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 20px;
      margin-top: 15px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--neon-cyan);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .cyber-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    .cyber-input:focus {
      outline: none;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(0, 180, 216, 0.3);
    }

    .cyber-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0077b6, var(--neon-cyan));
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 180, 216, 0.2);
    }

    .cyber-btn:hover {
      box-shadow: 0 0 20px var(--neon-cyan);
      transform: translateY(-1px);
    }

    .forgot-link-area {
      text-align: right;
      margin-top: 15px;
    }

    .forgot-link-area a {
      color: var(--text-muted);
      font-size: 12px;
      text-decoration: none;
      transition: color 0.3s;
    }

    .forgot-link-area a:hover {
      color: var(--neon-yellow);
    }

    #notification-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast-popup {
      background: rgba(17, 24, 39, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px 20px;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: slideIn 0.3s ease forwards;
    }

    .toast-success { border-left: 4px solid var(--neon-cyan); }
    .toast-error { border-left: 4px solid var(--neon-danger); }
    .toast-warning { border-left: 4px solid var(--neon-yellow); }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
  </style>
</head>
<body>

  <div id="notification-container"></div>

  <div class="app-container" style="margin-top: 50px;">
    <header style="text-align: center; margin-bottom: 25px;">
      <h2 style="color: #fff; margin: 0;">ROS গেটওয়ে লগইন</h2>
      <p style="color: var(--text-muted); font-size: 12px; margin-top: 5px;">Secure Node Authentication</p>
    </header>

    <form id="loginForm" class="cyber-card">
      <div class="form-group">
        <label>Email অথবা Member ID *</label>
        <input type="text" id="loginIdentifier" class="cyber-input" required placeholder="ROS-2026-0001 অথবা email@domain.com">
      </div>
      
      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="loginPassword" class="cyber-input" required placeholder="••••••••">
      </div>

      <button type="submit" id="loginBtn" class="cyber-btn">পোর্টালে প্রবেশ করুন</button>
      
      <div class="forgot-link-area">
        <a href="#" id="forgotPasswordLink">পাসওয়ার্ড ভুলে গেছেন?</a>
      </div>
    </form>

    <div id="resetModal" class="cyber-card" style="display: none; border-color: var(--neon-cyan);">
      <h3 style="color: var(--neon-cyan); font-size: 15px; margin: 0 0 15px 0; font-weight: 700; display: flex; align-items: center; gap: 8px;">
        <i class="fas fa-key"></i> পাসওয়ার্ড রিসেট পোর্টাল
      </h3>
      
      <div class="form-group">
        <label>আপনার Member ID অথবা Mobile Number লিখুন</label>
        <input type="text" id="resetIdentifier" class="cyber-input" placeholder="ROS-2026-0001 / 017XXXXXXXX">
      </div>

      <div style="background: rgba(0, 180, 216, 0.05); border: 1px dashed rgba(0, 180, 216, 0.3); padding: 12px; border-radius: 6px; font-size: 12px; color: #e5e7eb; line-height: 1.5; margin-bottom: 15px;">
        <i class="fas fa-info-circle" style="color: var(--neon-cyan);"></i> আপনার আইডি বা ফোন নম্বরটি ডাটাবেসের সাথে মিললে, আপনার অ্যাকাউন্টে রেজিস্টার্ড ইমেইলে সরাসরি পাসওয়ার্ড রিসেট লিংক চলে যাবে।
      </div>

      <div style="display: flex; gap: 10px;">
        <button type="button" id="submitResetBtn" class="cyber-btn">লিঙ্ক পাঠান</button>
        <button type="button" id="closeModalBtn" class="cyber-btn" style="background: #374151; box-shadow: none;">বন্ধ করুন</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🔗 আপনার মূল ফাইল থেকে সচল auth এবং db ভ্যারিয়েবল ইম্পোর্ট
    import { auth, db } from "../firebase-config.js";

    const loginForm = document.getElementById('loginForm');
    const loginIdentifierInput = document.getElementById('loginIdentifier');
    const loginPasswordInput = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');

    const forgotPasswordLink = document.getElementById('forgotPasswordLink');
    const resetModal = document.getElementById('resetModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const submitResetBtn = document.getElementById('submitResetBtn');
    const resetIdentifierInput = document.getElementById('resetIdentifier');
    const notificationContainer = document.getElementById('notification-container');

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast-popup toast-${type}`;
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-times-circle'}"></i> <span>${message}</span>`;
      notificationContainer.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'fadeOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    forgotPasswordLink.addEventListener('click', (e) => {
      e.preventDefault();
      resetModal.style.display = 'block';
      resetIdentifierInput.focus();
    });

    closeModalBtn.addEventListener('click', () => {
      resetModal.style.display = 'none';
      resetIdentifierInput.value = '';
    });

    // 🔐 ১. মূল লগইন হ্যান্ডলার (Role Based Dashboard Redirect)
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const identifier = loginIdentifierInput.value.trim();
      const password = loginPasswordInput.value;

      try {
        loginBtn.disabled = true;
        loginBtn.innerText = "যাচাই করা হচ্ছে...";
        let targetEmail = identifier;
        let userDocId = null;

        // যদি মেম্বার আইডি ইনপুট দেওয়া হয়
        if (!identifier.includes('@')) {
          const userQuery = query(collection(db, "users"), where("memberId", "==", identifier));
          const querySnapshot = await getDocs(userQuery);
          if (querySnapshot.empty) {
            showToast("এই মেম্বার আইডিটি ডাটাবেসে পাওয়া যায়নি!", "error");
            return;
          }
          const uData = querySnapshot.docs[0].data();
          targetEmail = uData.email;
          userDocId = querySnapshot.docs[0].id; // ফায়ারস্টোর ডকুমেন্ট আইডি সংরক্ষণ
        }

        // ফায়ারবেস অথেন্টিকেশন দিয়ে সাইন-ইন
        const userCredential = await signInWithEmailAndPassword(auth, targetEmail, password);
        const user = userCredential.user;

        // যদি লগইন সরাসরি ইমেইল দিয়ে করা হয়ে থাকে, তবে তার ডকুমেন্ট আইডি বের করার জন্য uid ব্যবহার করা হচ্ছে
        if (!userDocId) {
          userDocId = user.uid;
        }

        loginBtn.innerText = "রোল চেক করা হচ্ছে...";

        // 🎯 ফায়ারস্টোর থেকে ইউজারের ডাটা তুলে আনা (Role চেক করার জন্য)
        // নোট: যদি ফায়ারস্টোর ডকুমেন্টের নাম ইউজারের Auth UID-এর সাথে মিল রেখে তৈরি করা হয়, তবে doc(db, "users", user.uid) সরাসরি কাজ করবে।
        // অন্যথায় সার্চ করা ডকুমেন্ট আইডি ব্যবহার করা হচ্ছে।
        let userDocRef = doc(db, "users", userDocId);
        let userDocSnap = await getDoc(userDocRef);

        // সেফটি চেক: যদি সরাসরি আইডি দিয়ে না পাওয়া যায়, তবে ইমেইল দিয়ে আবার কুয়েরি করা হচ্ছে
        if (!userDocSnap.exists()) {
          const emailQuery = query(collection(db, "users"), where("email", "==", targetEmail));
          const emailSnapshot = await getDocs(emailQuery);
          if (!emailSnapshot.empty) {
            userDocSnap = emailSnapshot.docs[0];
          }
        }

        if (userDocSnap.exists() && (userDocSnap.data ? userDocSnap.data() : userDocSnap.data)) {
          const userData = typeof userDocSnap.data === 'function' ? userDocSnap.data() : userDocSnap.data;
          const userRole = userData.role ? userData.role.toLowerCase().trim() : 'member';

          showToast("লগইন সফল হয়েছে! ড্যাশবোর্ডে নিয়ে যাওয়া হচ্ছে...", "success");

          // 🔀 Role অনুযায়ী আলাদা আলাদা পেজে রিডাইরেক্ট লজিক
          setTimeout(() => {
            if (userRole === 'super_admin') {
              window.location.href = "../admin/dashboard.html";
            } else if (userRole === 'general_member') {
              window.location.href = "../member/dashboard.html";
            } else {
              window.location.href = "../member/dashboard.html"; // ডিফল্ট বা মেম্বার ড্যাশবোর্ড
            }
          }, 1000);

        } else {
          showToast("লগইন সফল কিন্তু ডাটাবেসে প্রোফাইল পাওয়া যায়নি!", "warning");
        }

      } catch (error) {
        console.error("Login Error: ", error);
        showToast("ভুল ইমেইল/আইডি অথবা পাসওয়ার্ড দিয়েছেন!", "error");
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerText = "পোর্টালে প্রবেশ করুন";
      }
    });

    // 🔄 ২. পাসওয়ার্ড রিসেট লজিক
    submitResetBtn.addEventListener('click', async () => {
      const searchKey = resetIdentifierInput.value.trim();

      if (!searchKey) {
        showToast("অনুগ্রহ করে আপনার Member ID অথবা মোবাইল নম্বর দিন।", "warning");
        return;
      }

      try {
        submitResetBtn.disabled = true;
        submitResetBtn.innerText = "ডাটাবেস খোঁজা হচ্ছে...";

        let userQuery = query(collection(db, "users"), where("memberId", "==", searchKey));
        let querySnapshot = await getDocs(userQuery);

        if (querySnapshot.empty) {
          userQuery = query(collection(db, "users"), where("mobileNumber", "==", searchKey));
          querySnapshot = await getDocs(userQuery);
        }

        if (querySnapshot.empty) {
          showToast("দুঃখিত, ডাটাবেসে এই তথ্য দিয়ে কোনো অ্যাকাউন্ট পাওয়া যায়নি!", "error");
          return;
        }

        const userData = querySnapshot.docs[0].data();
        const userEmail = userData.email;
        const userName = userData.banglaName || userData.englishName || "মেম্বার";

        if (!userEmail) {
          showToast("এই অ্যাকাউন্টের সাথে কোনো বৈধ ইমেইল যুক্ত নেই!", "error");
          return;
        }

        submitResetBtn.innerText = "লিঙ্ক পাঠানো হচ্ছে...";
        await sendPasswordResetEmail(auth, userEmail);

        showToast(`🔒 প্রিয় ${userName}, আপনার রেজিস্টার্ড ইমেইলে (${userEmail}) পাসওয়ার্ড রিসেট লিঙ্কটি পাঠানো হয়েছে!`, "success");
        resetModal.style.display = 'none';
        resetIdentifierInput.value = '';

      } catch (error) {
        console.error("Reset Error: ", error);
        showToast("সার্ভার রেসপন্স করছে না! আবার চেষ্টা করুন।", "error");
      } finally {
        submitResetBtn.disabled = false;
        submitResetBtn.innerText = "লিঙ্ক পাঠান";
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROS Nexus - Official Member ERP Console</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --dark-bg: #030a16;         
      --panel-bg: #051124;        
      --card-bg: rgba(6, 20, 43, 0.45); 
      --secondary: #00f5ff;       /* ইলেকট্রিক সায়ান নিয়ন */
      --accent: #ffb703;          /* প্রিমিয়াম গোল্ডেন */
      --neon-green: #00f5d4;      
      --neon-red: #ff4d6d;        
      --text-light: #f8fafc;      
      --text-muted: #64748b;      
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', 'Poppins', sans-serif; }
    body { background-color: var(--dark-bg); color: var(--text-light); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark-bg); }
    ::-webkit-scrollbar-thumb { background: rgba(0, 245, 255, 0.15); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--secondary); }

    .cyber-glass { 
      background: var(--card-bg); 
      backdrop-filter: blur(16px); 
      -webkit-backdrop-filter: blur(16px); 
      border: 1px solid rgba(0, 245, 255, 0.08); 
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); 
    }
    
    .header-station { 
      height: 70px; 
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; 
      display: flex; align-items: center; justify-content: space-between; padding: 0 30px; 
      border-bottom: 1px solid rgba(0, 245, 255, 0.1);
    }

    .brand-title { font-size: 20px; font-weight: 700; letter-spacing: 1.5px; display: flex; align-items: center; gap: 12px; }
    .brand-title span { 
      font-size: 11px; color: var(--accent); font-weight: 700; 
      background: rgba(255, 183, 3, 0.1); padding: 3px 10px; border-radius: 4px; 
      border: 1px solid rgba(255, 183, 3, 0.2); text-transform: uppercase;
    }
    
    .mobile-menu-toggle { 
      display: none; background: transparent; border: 1px solid rgba(0, 245, 255, 0.2); 
      color: var(--secondary); width: 40px; height: 40px; border-radius: 8px; 
      align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; 
    }
    .mobile-menu-toggle:hover { background: rgba(0, 245, 255, 0.1); box-shadow: 0 0 15px rgba(0, 245, 255, 0.3); }
    
    .user-profile-trigger { 
      display: flex; align-items: center; gap: 14px; cursor: pointer; position: relative; 
      padding: 5px 16px; border-radius: 40px; border: 1px solid rgba(0, 245, 255, 0.08); 
      background: rgba(255, 255, 255, 0.01); transition: 0.3s; 
    }
    .user-profile-trigger:hover { border-color: rgba(0, 245, 255, 0.3); background: rgba(0, 245, 255, 0.03); }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--secondary); object-fit: cover; }
    .member-badge { font-size: 9px; font-weight: 700; padding: 4px 12px; border-radius: 20px; background: rgba(0, 245, 212, 0.1); color: var(--neon-green); border: 1px solid rgba(0, 245, 212, 0.2); letter-spacing: 1px; }
    
    .profile-dropdown { 
      position: absolute; top: 60px; right: 0; width: 260px; border-radius: 12px; 
      padding: 8px 0; display: none; flex-direction: column; z-index: 1500; 
      border: 1px solid rgba(0, 245, 255, 0.15); background: var(--panel-bg); box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      animation: dropSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
    }
    @keyframes dropSlide { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .dropdown-user-info { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 6px; }
    .dropdown-user-info h4 { font-size: 15px; color: var(--text-light); font-weight: 600; }
    .dropdown-user-info small { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; word-break: break-all; }
    
    .profile-dropdown button { 
      padding: 12px 16px; color: var(--text-light); font-size: 13px; display: flex; 
      align-items: center; gap: 12px; transition: 0.2s; background: transparent; border: none; width: 100%; text-align: left; cursor: pointer; 
    }
    .profile-dropdown button:hover { background: rgba(0, 245, 255, 0.05); color: var(--secondary); }
    .profile-dropdown .logout-btn { color: var(--neon-red); border-top: 1px solid rgba(255,255,255,0.05); margin-top: 6px; }
    .profile-dropdown .logout-btn:hover { background: rgba(255, 77, 109, 0.08); }
    
    .erp-wrapper { display: flex; flex: 1; margin-top: 70px; height: calc(100vh - 70px); position: relative; }
    
    .sidebar-nav { width: 270px; height: 100%; border-right: 1px solid rgba(0, 245, 255, 0.08); display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; overflow-y: auto; }
    .sidebar-header { padding: 22px 24px 12px 24px; font-size: 10px; letter-spacing: 2px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
    .sidebar-menu { list-style: none; padding: 10px 0; flex: 1; }
    .menu-item { margin: 6px 16px; position: relative; border-radius: 8px; overflow: hidden; }
    
    .menu-item a { 
      display: flex; align-items: center; gap: 14px; padding: 12px 16px; color: #94a3b8; 
      text-decoration: none; font-size: 14px; font-weight: 500; border-radius: 8px; transition: all 0.25s ease; 
    }
    .menu-item a:hover, .menu-item.active > a { color: #fff; background: rgba(0, 245, 255, 0.05); }
    .menu-item.active > a { border-left: 3px solid var(--secondary); border-radius: 0 8px 8px 0; background: rgba(0, 245, 255, 0.08); }
    .menu-item .arrow-icon { margin-left: auto; font-size: 11px; transition: transform 0.3s; }
    .menu-item.open .arrow-icon { transform: rotate(180deg); color: var(--secondary); }
    .menu-item a i { width: 20px; text-align: center; font-size: 16px; color: var(--secondary); }

    .submenu-list { list-style: none; padding-left: 15px; background: rgba(2, 10, 22, 0.3); display: none; margin-top: 2px; }
    .submenu-item { margin: 2px 0; }
    .submenu-item a { padding: 10px 16px; font-size: 13px; color: #64748b; border-radius: 6px; }
    .submenu-item a:hover, .submenu-item.active a { color: var(--secondary); background: transparent; }
    .submenu-item.active a { color: var(--accent); font-weight: 600; }
    
    .main-content-node { flex: 1; padding: 30px; overflow-y: auto; position: relative; background: radial-gradient(circle at 50% 10%, rgba(0, 245, 255, 0.02) 0%, transparent 70%); }
    
    .cyber-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 10, 22, 0.8); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .cyber-modal-card { width: 100%; max-width: 420px; padding: 30px; border-radius: 16px; border: 1px solid rgba(0, 245, 255, 0.2); box-shadow: 0 0 50px rgba(0, 245, 255, 0.1); }
    .cyber-modal-card h3 { font-size: 18px; margin-bottom: 22px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #fff; display: flex; align-items: center; gap: 10px; }
    .form-group-node { margin-bottom: 20px; }
    .form-group-node label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
    .form-input-node { width: 100%; background: rgba(3, 10, 22, 0.5); border: 1px solid rgba(0, 245, 255, 0.15); padding: 12px 16px; border-radius: 8px; color: #fff; font-size: 14px; transition: 0.3s; }
    .form-input-node:focus { border-color: var(--secondary); box-shadow: 0 0 15px rgba(0, 245, 255, 0.2); outline: none; }
    .modal-action-row { display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; }
    
    .cyber-btn { padding: 11px 24px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.25s; border: 1px solid transparent; }
    .cyber-btn-muted { background: transparent; border-color: rgba(255,255,255,0.1); color: var(--text-muted); }
    .cyber-btn-muted:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .cyber-btn-primary { background: rgba(0, 245, 255, 0.05); border-color: var(--secondary); color: var(--secondary); }
    .cyber-btn-primary:hover { background: var(--secondary); color: #030a16; box-shadow: 0 0 20px rgba(0, 245, 255, 0.4); }

    @media (max-width: 992px) {
      .mobile-menu-toggle { display: flex; }
      .sidebar-nav { position: fixed; top: 70px; left: -270px; height: calc(100vh - 70px); z-index: 1400; width: 270px; background: var(--dark-bg); }
      .sidebar-nav.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
      .main-content-node { padding: 20px 15px; }
      #topNavRole { display: none !important; }
    }
  </style>
</head>
<body>

  <header class="header-station cyber-glass">
    <div style="display: flex; align-items: center; gap: 15px;">
      <button class="mobile-menu-toggle" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
      <div class="brand-title">ROS NEXUS <span>কনসোল</span></div>
    </div>
    
    <div class="user-profile-trigger" id="profileTrigger">
      <span class="member-badge" id="topNavRole">MEMBER</span>
      <img src="../placeholder.png" class="user-avatar" id="topNavAvatar">
      
      <div class="profile-dropdown" id="profileDropdown">
        <div class="dropdown-user-info">
          <h4 id="dropMemberName">সদস্য নাম</h4>
          <small id="dropMemberEmail">member@ros.org</small>
        </div>
        <button id="openPassModalBtn"><i class="fas fa-key"></i> পাসওয়ার্ড পরিবর্তন</button>
        <button id="memberSignOutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> লগআউট করুন</button>
      </div>
    </div>
  </header>

  <div class="erp-wrapper">
    <aside class="sidebar-nav cyber-glass" id="sidebarNode">
      <div class="sidebar-header">MEMBER MATRIX</div>
      <ul class="sidebar-menu">
        
        <li class="menu-item active" id="menuProfileLink" data-id="profile">
          <a href="#"><i class="fas fa-columns"></i> ওভারভিউ প্রোфাইল</a>
        </li>
        
        <li class="menu-item" id="parentDropdownMenu">
          <a href="#" id="toggleDropdownBtn">
            <i class="fas fa-sliders-h"></i> একশন সেন্টার 
            <i class="fas fa-chevron-down arrow-icon"></i>
          </a>
          <ul class="submenu-list" id="submenuList">
            <li class="submenu-item" id="menuUpdateInfoLink" data-id="updateInfo">
              <a href="#"><i class="fas fa-user-cog"></i> তথ্য পরিবর্তন</a>
            </li>
            <li class="submenu-item" id="menuAppLink" data-id="myRequests">
              <a href="#"><i class="fas fa-folder-open"></i> আমার আবেদনসমূহ</a>
            </li>
          </ul>
        </li>

      </ul>
    </aside>

    <main class="main-content-node" id="spaContentRoot"></main>
  </div>

  <div class="cyber-modal-overlay" id="passwordChangeModal">
    <div class="cyber-modal-card cyber-glass">
      <h3><i class="fas fa-shield-alt" style="color: var(--secondary);"></i> পাসওয়ার্ড কনফিগারেশন</h3>
      <form id="passwordUpdateForm">
        <div class="form-group-node">
          <label>নতুন এক্সেস পাসওয়ার্ড</label>
          <input type="password" id="newPassword" class="form-input-node" required minlength="6">
        </div>
        <div class="form-group-node">
          <label>পাসওয়ার্ড পুনর্লিখন</label>
          <input type="password" id="confirmNewPassword" class="form-input-node" required minlength="6">
        </div>
        <div class="modal-action-row">
          <button type="button" class="cyber-btn cyber-btn-muted" id="closePassModalBtn">বাতিল</button>
          <button type="submit" class="cyber-btn cyber-btn-primary">আপডেট কনসোল</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../member/profile.js"></script>
  <script src="../member/updateProfile.js"></script>
  <script src="../member/myRequest.js"></script>

  <script type="module">
    // ফায়ারবেস থেকে serverTimestamp ইমপোর্ট করা হলো (যা আগে মিসিং ছিল)
    import { db, auth } from '../firebase-config.js';
    import { doc, onSnapshot, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const sidebarNode = document.getElementById('sidebarNode');
    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const spaContentRoot = document.getElementById('spaContentRoot');
    const profileTrigger = document.getElementById('profileTrigger');
    const profileDropdown = document.getElementById('profileDropdown');
    const passwordChangeModal = document.getElementById('passwordChangeModal');
    
    const parentDropdownMenu = document.getElementById('parentDropdownMenu');
    const toggleDropdownBtn = document.getElementById('toggleDropdownBtn');
    const submenuList = document.getElementById('submenuList');

    toggleDropdownBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const isOpen = parentDropdownMenu.classList.contains('open');
      if (isOpen) {
        submenuList.style.display = 'none';
        parentDropdownMenu.classList.remove('open');
      } else {
        submenuList.style.display = 'block';
        parentDropdownMenu.classList.add('open');
      }
    });

    function switchModuleView(moduleId, clickedElement) {
      document.querySelectorAll('.sidebar-menu .menu-item, .submenu-list .submenu-item').forEach(el => el.classList.remove('active'));
      
      if(clickedElement) {
        clickedElement.classList.add('active');
        if(clickedElement.classList.contains('submenu-item')) {
          parentDropdownMenu.classList.add('active');
        } else {
          parentDropdownMenu.classList.remove('active');
          submenuList.style.display = 'none';
          parentDropdownMenu.classList.remove('open');
        }
      }
      
      sidebarNode.classList.remove('active');
      spaContentRoot.innerHTML = "";

      if (moduleId === 'profile') {
        loadProfileModule(spaContentRoot, db, auth, doc, onSnapshot, signOut);
      } else if (moduleId === 'updateInfo') {
        // ফিক্সড: contentRoot কে spaContentRoot করা হয়েছে এবং serverTimestamp সফলভাবে পাঠানো হচ্ছে
        loadUpdateInfoModule(spaContentRoot, db, auth, doc, onSnapshot, updateDoc, serverTimestamp);
      } else if (moduleId === 'myRequests') {
        loadMyRequestsModule(spaContentRoot, db, auth, doc, onSnapshot, updateDoc);
      }
    }

    document.getElementById('menuProfileLink').addEventListener('click', function(e) {
      e.preventDefault();
      switchModuleView('profile', this);
    });

    document.querySelectorAll('.submenu-list .submenu-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        switchModuleView(item.getAttribute('data-id'), item);
      });
    });

    profileTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      profileDropdown.style.display = profileDropdown.style.display === 'flex' ? 'none' : 'flex';
    });
    document.addEventListener('click', () => { profileDropdown.style.display = 'none'; });
    
    mobileMenuToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      sidebarNode.classList.toggle('active');
    });

    document.getElementById('openPassModalBtn').addEventListener('click', () => passwordChangeModal.style.display = 'flex');
    document.getElementById('closePassModalBtn').addEventListener('click', () => passwordChangeModal.style.display = 'none');
    
    document.getElementById('passwordUpdateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPass = document.getElementById('newPassword').value;
      if (newPass !== document.getElementById('confirmNewPassword').value) { alert("পাসওয়ার্ড ম্যাচ করছে না!"); return; }
      try { 
        await updatePassword(auth.currentUser, newPass); 
        alert("🔒 পাসওয়ার্ড সফলভাবে আপডেট হয়েছে!"); 
        passwordChangeModal.style.display = 'none'; 
        document.getElementById('passwordUpdateForm').reset();
      } catch (err) { alert(err.message); }
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "../login.html"; return; }
      onSnapshot(doc(db, "users", user.uid), (snapshot) => {
        if (snapshot.exists()) {
          const memberData = snapshot.data();
          document.getElementById('topNavRole').innerText = (memberData.role || "MEMBER").toUpperCase();
          document.getElementById('topNavAvatar').src = memberData.photoUrl || '../placeholder.png';
          document.getElementById('dropMemberName').innerText = memberData.englishName || "সদস্য নাম";
          document.getElementById('dropMemberEmail').innerText = user.email;

          if(!spaContentRoot.hasChildNodes() || spaContentRoot.innerHTML.trim() === ""){
             switchModuleView('profile', document.getElementById('menuProfileLink'));
          }
        } else {
          alert("প্রোফাইল ডাটা পাওয়া যায়নি!");
          signOut(auth);
        }
      });
    });

    document.getElementById('memberSignOutBtn').addEventListener('click', () => {
      if (confirm("আপনি কি নিশ্চিত লগআউট করতে চান?")) {
        signOut(auth).then(() => { window.location.href = "../login.html"; });
      }
    });
  </script>
</body>
</html>

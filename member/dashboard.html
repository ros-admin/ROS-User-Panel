<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROS Nexus - Official Member ERP Console</title>
  
  <!-- অফিশিয়াল ফন্ট ও আইকন প্যাক সিডিএন -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* অফিশিয়াল ব্র্যান্ডিং কালার লকড সিস্টেম */
    :root {
      --dark-bg: #020c1b;         /* প্রধান ব্যাকগ্রাউন্ড (Deep Space Navy) */
      --panel-bg: #040d1a;        /* ড্রপডাউন অপশন এবং টেবিল ইনার ডার্ক টোন */
      --card-bg: rgba(10, 25, 47, 0.65); /* গ্লাস-মরফিজম প্যানেল ও মডাল কার্ড */
      --secondary: #00b4d8;       /* নিয়ন স্কাই ব্লু (বাটন, লিংক ও একটিভ স্টেট) */
      --accent: #ffd700;          /* গোল্ডেন হলুদ (টাইটেল হাইলাইট ও ব্যাজ) */
      --neon-green: #2ec4b6;      /* সচল/একটিভ মেম্বার ইন্ডিকেটর */
      --neon-red: #e63946;        /* লগআউট এবং ডেঞ্জার বাটন */
      --text-light: #f1f5f9;      /* মূল রিডেবল টেক্সট */
      --text-muted: #94a3b8;      /* সেকেন্ডারি ডিসক্রিপশন টেক্সট */
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Hind Siliguri', 'Poppins', sans-serif; 
    }

    body { 
      background-color: var(--dark-bg); 
      color: var(--text-light); 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
      overflow-x: hidden; 
    }
    
    /* কাস্টম স্ক্রলবার */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark-bg); }
    ::-webkit-scrollbar-thumb { background: rgba(0, 180, 216, 0.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--secondary); }

    /* গ্লাস-মরফিজম কমন ইন্টারফেস */
    .cyber-glass { 
      background: var(--card-bg); 
      backdrop-filter: blur(15px); 
      -webkit-backdrop-filter: blur(15px); 
      border: 1px solid rgba(0, 180, 216, 0.15); 
      box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.5); 
    }
    
    /* টপ হেডার স্টেশন */
    .header-station { 
      height: 65px; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      z-index: 1000; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0 24px; 
      border-bottom: 1px solid rgba(0, 180, 216, 0.15); 
    }

    .brand-title { 
      font-size: 19px; 
      font-weight: 700; 
      letter-spacing: 1px; 
      color: var(--text-light);
      display: flex; 
      align-items: center; 
      gap: 10px; 
    }

    .brand-title span { 
      font-size: 13px; 
      color: var(--accent); 
      font-weight: 600; 
      background: rgba(255, 215, 0, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }
    
    .mobile-menu-toggle { 
      display: none; 
      background: transparent; 
      border: 1px solid rgba(0, 180, 216, 0.2); 
      color: var(--secondary); 
      width: 38px; 
      height: 38px; 
      border-radius: 6px; 
      align-items: center; 
      justify-content: center; 
      cursor: pointer; 
      transition: 0.3s; 
    }

    .mobile-menu-toggle:hover { 
      background: rgba(0, 180, 216, 0.1); 
      box-shadow: 0 0 10px var(--secondary); 
    }
    
    /* ইউজার প্রোফাইল ও ট্রিগার */
    .user-profile-trigger { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      cursor: pointer; 
      position: relative; 
      padding: 6px 14px; 
      border-radius: 30px; 
      border: 1px solid rgba(0, 180, 216, 0.1); 
      background: rgba(255, 255, 255, 0.02);
      transition: 0.3s; 
    }

    .user-profile-trigger:hover { 
      border-color: rgba(0, 180, 216, 0.4); 
      background: rgba(0, 180, 216, 0.05); 
    }

    .user-avatar { 
      width: 34px; 
      height: 34px; 
      border-radius: 50%; 
      border: 2px solid var(--secondary); 
      object-fit: cover; 
    }
    
    .member-badge { 
      font-size: 10px; 
      font-weight: 700; 
      text-transform: uppercase; 
      padding: 3px 10px; 
      border-radius: 20px; 
      background: rgba(46, 196, 182, 0.1); 
      color: var(--neon-green); 
      border: 1px solid rgba(46, 196, 182, 0.2);
      letter-spacing: 0.5px;
    }
    
    /* প্রোফাইল ড্রপডাউন মেনু */
    .profile-dropdown { 
      position: absolute; 
      top: 55px; 
      right: 0; 
      width: 250px; 
      border-radius: 8px; 
      padding: 6px 0; 
      display: none; 
      flex-direction: column; 
      z-index: 1500; 
      border: 1px solid rgba(0, 180, 216, 0.2); 
      background: var(--panel-bg);
      animation: dropSlide 0.25s ease; 
    }

    @keyframes dropSlide { 
      from { opacity: 0; transform: translateY(-10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    .dropdown-user-info { 
      padding: 14px 16px; 
      border-bottom: 1px solid rgba(0, 180, 216, 0.15); 
      margin-bottom: 4px; 
    }

    .dropdown-user-info h4 { font-size: 14px; color: var(--text-light); font-weight: 600; }
    .dropdown-user-info small { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; word-break: break-all; }
    
    .profile-dropdown button { 
      padding: 11px 16px; 
      color: var(--text-light); 
      text-decoration: none; 
      font-size: 13px; 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      transition: 0.2s; 
      background: transparent; 
      border: none; 
      width: 100%; 
      text-align: left; 
      cursor: pointer; 
    }

    .profile-dropdown button:hover { 
      background: rgba(0, 180, 216, 0.1); 
      color: var(--secondary); 
    }

    .profile-dropdown .logout-btn { 
      color: var(--neon-red); 
      border-top: 1px solid rgba(0, 180, 216, 0.1); 
      margin-top: 4px; 
    }

    .profile-dropdown .logout-btn:hover { 
      background: rgba(230, 57, 70, 0.1); 
      color: var(--neon-red); 
    }
    
    /* মূল লেআউট স্ট্রাকচার */
    .erp-wrapper { 
      display: flex; 
      flex: 1; 
      margin-top: 65px; 
      position: relative; 
      height: calc(100vh - 65px); 
    }

    .sidebar-nav { 
      width: 260px; 
      height: 100%; 
      border-right: 1px solid rgba(0, 180, 216, 0.15); 
      display: flex; 
      flex-direction: column; 
      flex-shrink: 0; 
      transition: 0.3s; 
      overflow-y: auto; 
    }

    .sidebar-header { 
      padding: 18px 20px; 
      border-bottom: 1px solid rgba(0, 180, 216, 0.1); 
      font-size: 11px; 
      letter-spacing: 1.5px; 
      color: var(--secondary); 
      font-weight: 700;
      text-transform: uppercase; 
    }

    .sidebar-menu { list-style: none; padding: 10px 0; flex: 1; }
    .menu-item { margin: 4px 12px; position: relative; }

    .menu-item a { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      padding: 11px 15px; 
      color: var(--text-muted); 
      text-decoration: none; 
      font-size: 14px; 
      font-weight: 600; 
      border-radius: 6px; 
      transition: all 0.2s ease; 
      border-left: 3px solid transparent; 
    }

    .menu-item a:hover, .menu-item.active > a { 
      color: #fff; 
      background: rgba(0, 180, 216, 0.08); 
      border-left-color: var(--secondary); 
    }

    /* ড্রপডাউন ডাউন-অ্যারো আইকন */
    .menu-item .arrow-icon {
      margin-left: auto;
      font-size: 12px;
      transition: transform 0.3s ease;
    }
    .menu-item.open .arrow-icon {
      transform: rotate(180deg);
      color: var(--accent);
    }

    .menu-item a i { 
      width: 18px; 
      text-align: center; 
      font-size: 15px; 
      color: var(--secondary); 
      transition: 0.2s; 
    }

    /* সাব-মেনু আল্ট্রা লেআউট */
    .submenu-list {
      list-style: none;
      padding-left: 20px;
      margin-top: 2px;
      display: none; /* ডিফল্ট হাইড থাকবে */
    }
    .submenu-item {
      margin: 2px 0;
    }
    .submenu-item a {
      padding: 9px 15px;
      font-size: 13px;
      border-left: 2px solid transparent;
      border-radius: 4px;
    }
    .submenu-item.active a {
      color: var(--accent);
      background: rgba(255, 215, 0, 0.05);
      border-left-color: var(--accent);
    }
    
    /* কনটেন্ট রুট নোড */
    .main-content-node { 
      flex: 1; 
      padding: 25px; 
      overflow-y: auto; 
      position: relative; 
      background: radial-gradient(circle at 50% 50%, rgba(0, 180, 216, 0.03) 0%, transparent 100%); 
    }
    
    /* সিকিউরিটি মোডাল */
    .cyber-modal-overlay { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(2, 12, 27, 0.85); 
      backdrop-filter: blur(8px); 
      z-index: 2000; 
      display: none; 
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
    }

    .cyber-modal-card { 
      width: 100%; 
      max-width: 400px; 
      padding: 30px; 
      border-radius: 12px; 
      border: 1px solid rgba(0, 180, 216, 0.25); 
      box-shadow: 0 0 40px rgba(0, 180, 216, 0.15); 
      position: relative; 
    }

    .cyber-modal-card h3 { 
      font-size: 18px; 
      margin-bottom: 20px; 
      border-bottom: 1px solid rgba(0, 180, 216, 0.15); 
      padding-bottom: 10px; 
      color: var(--text-light); 
    }

    .form-group-node { margin-bottom: 18px; }
    .form-group-node label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    
    .form-input-node { 
      width: 100%; 
      background: rgba(2, 12, 27, 0.6); 
      border: 1px solid rgba(0, 180, 216, 0.2); 
      padding: 11px 14px; 
      border-radius: 6px; 
      color: #fff; 
      font-size: 14px; 
      transition: 0.3s; 
    }

    .form-input-node:focus { 
      border-color: var(--secondary); 
      box-shadow: 0 0 12px rgba(0, 180, 216, 0.25); 
      outline: none; 
    }

    .modal-action-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
    
    .cyber-btn { 
      padding: 10px 20px; 
      font-size: 13px; 
      font-weight: 600; 
      border: 1px solid transparent; 
      border-radius: 6px; 
      cursor: pointer; 
      transition: 0.2s; 
    }

    .cyber-btn-muted { 
      background: transparent; 
      border-color: rgba(0, 180, 216, 0.2); 
      color: var(--text-muted); 
    }
    .cyber-btn-muted:hover { background: rgba(255,255,255,0.05); color: #fff; }
    
    .cyber-btn-primary { 
      background: rgba(0, 180, 216, 0.1); 
      border-color: var(--secondary); 
      color: var(--secondary); 
    }
    .cyber-btn-primary:hover { 
      background: var(--secondary); 
      color: #020c1b; 
      box-shadow: 0 0 15px rgba(0, 180, 216, 0.4); 
    }

    /* রেসপন্সিভ মিডিয়া কোয়েরি */
    @media (max-width: 992px) {
      .mobile-menu-toggle { display: flex; }
      .sidebar-nav { 
        position: fixed; 
        top: 65px; 
        left: -260px; 
        height: calc(100vh - 65px); 
        z-index: 1400; 
        width: 260px; 
        background: #020c1b; 
      }
      .sidebar-nav.active { left: 0; box-shadow: 10px 0 40px rgba(0,0,0,0.6); }
      .main-content-node { padding: 16px; }
      #topNavRole { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- টপ নেভিগেশন স্টেশন -->
  <header class="header-station cyber-glass">
    <div style="display: flex; align-items: center; gap: 15px;">
      <button class="mobile-menu-toggle" id="mobileMenuToggle">
        <i class="fas fa-bars"></i>
      </button>
      <div class="brand-title">ROS NEXUS <span>কনসোল</span></div>
    </div>
    
    <div class="user-profile-trigger" id="profileTrigger">
      <span class="member-badge" id="topNavRole">MEMBER</span>
      <img src="../placeholder.png" class="user-avatar" id="topNavAvatar">
      
      <div class="profile-dropdown" id="profileDropdown">
        <div class="dropdown-user-info">
          <h4 id="dropMemberName">সদস্য নাম</h4>
          <small id="dropMemberEmail">member@ros.org</small>
        </div>
        <button id="openPassModalBtn"><i class="fas fa-key"></i> পাসওয়ার্ড পরিবর্তন</button>
        <button id="memberSignOutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> লগআউট করুন</button>
      </div>
    </div>
  </header>

  <!-- কোর লেআউট কন্টেইনার -->
  <div class="erp-wrapper">
    <aside class="sidebar-nav cyber-glass" id="sidebarNode">
      <div class="sidebar-header">MEMBER MATRIX</div>
      <ul class="sidebar-menu">
        
        <!-- প্রোফাইল (একক মেনু) -->
        <li class="menu-item active" id="menuProfileLink" data-id="profile">
          <a href="#"><i class="fas fa-user-circle"></i> প্রোফাইল</a>
        </li>
        
        <!-- আবেদন ও প্রোফাইল (ড্রপডাউন প্যারেন্ট মেনু) -->
        <li class="menu-item" id="parentDropdownMenu">
          <a href="#" id="toggleDropdownBtn">
            <i class="fas fa-folder-open"></i> আবেদন ও প্রোফাইল 
            <i class="fas fa-chevron-down arrow-icon"></i>
          </a>
          <!-- সাবমেনু তালিকাসমূহ -->
          <ul class="submenu-list" id="submenuList">
            <li class="submenu-item" id="menuUpdateInfoLink" data-id="updateInfo">
              <a href="#"><i class="fas fa-user-edit"></i> তথ্য পরিবর্তন</a>
            </li>
            <li class="submenu-item" id="menuAppLink" data-id="myRequests">
              <a href="#"><i class="fas fa-file-alt"></i> আমার আবেদন</a>
            </li>
          </ul>
        </li>

      </ul>
    </aside>

    <!-- ডাইনামিক কম্পোনেন্ট রেন্ডার নোড -->
    <main class="main-content-node" id="spaContentRoot"></main>
  </div>

  <!-- পাসওয়ার্ড পরিবর্তন সিকিউরিটি মডাল -->
  <div class="cyber-modal-overlay" id="passwordChangeModal">
    <div class="cyber-modal-card cyber-glass">
      <h3>🔒 নিরাপত্তা পাসওয়ার্ড আপডেট</h3>
      <form id="passwordUpdateForm">
        <div class="form-group-node">
          <label>নতুন পাসওয়ার্ড লিখুন</label>
          <input type="password" id="newPassword" class="form-input-node" required minlength="6">
        </div>
        <div class="form-group-node">
          <label>নতুন পাসওয়ার্ড পুনরায় নিশ্চিত করুন</label>
          <input type="password" id="confirmNewPassword" class="form-input-node" required minlength="6">
        </div>
        <div class="modal-action-row">
          <button type="button" class="cyber-btn cyber-btn-muted" id="closePassModalBtn">বাতিল</button>
          <button type="submit" class="cyber-btn cyber-btn-primary">সংরক্ষণ করুন</button>
        </div>
      </form>
    </div>
  </div>

  <!-- এক্সটার্নাল মডুলার স্ক্রিপ্ট সংযোগ -->
  <script src="../member/profile.js"></script>
  <script src="../member/updateProfile.js"></script>
  <script src="../member/myRequest.js"></script>

  <!-- ফায়ারবেস ইন্টিগ্রেশন এবং লজিক কোড লুপ -->
  <script type="module">
    import { db, auth } from '../firebase-config.js';
    import { doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const sidebarNode = document.getElementById('sidebarNode');
    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const spaContentRoot = document.getElementById('spaContentRoot');
    const profileTrigger = document.getElementById('profileTrigger');
    const profileDropdown = document.getElementById('profileDropdown');
    const passwordChangeModal = document.getElementById('passwordChangeModal');
    
    const parentDropdownMenu = document.getElementById('parentDropdownMenu');
    const toggleDropdownBtn = document.getElementById('toggleDropdownBtn');
    const submenuList = document.getElementById('submenuList');

    // সাবমেনু টগল লজিক (Slide Up/Down)
    toggleDropdownBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const isOpen = parentDropdownMenu.classList.contains('open');
      if (isOpen) {
        submenuList.style.display = 'none';
        parentDropdownMenu.classList.remove('open');
      } else {
        submenuList.style.display = 'block';
        parentDropdownMenu.classList.add('open');
      }
    });

    // এসপিএ (SPA) রাউটার ইঞ্জিন
    function switchModuleView(moduleId, clickedElement) {
      // সমস্ত একটিভ ক্লাস রিমুভ করা
      document.querySelectorAll('.sidebar-menu .menu-item, .submenu-list .submenu-item').forEach(el => el.classList.remove('active'));
      
      if(clickedElement) {
        clickedElement.classList.add('active');
        // যদি সাবমেনুর কোনো আইটেম ক্লিক হয়, তবে প্যারেন্ট মেনুকেও একটিভ স্টাইল দেবে
        if(clickedElement.classList.contains('submenu-item')) {
          parentDropdownMenu.classList.add('active');
        } else {
          parentDropdownMenu.classList.remove('active');
          // প্রোফাইল ক্লিক করলে সাবমেনু বন্ধ করে দেবে অটোমেটিকভাবে
          submenuList.style.display = 'none';
          parentDropdownMenu.classList.remove('open');
        }
      }
      
      sidebarNode.classList.remove('active');
      spaContentRoot.innerHTML = "";

      if (moduleId === 'profile') {
        loadProfileModule(spaContentRoot, db, auth, doc, onSnapshot, signOut);
      } else if (moduleId === 'updateInfo') {
        loadUpdateInfoModule(spaContentRoot, db, auth, doc, onSnapshot, updateDoc);
      } else if (moduleId === 'myRequests') {
        loadMyRequestsModule(spaContentRoot, db, auth, doc, onSnapshot, updateDoc);
      }
    }

    // মেইন মেনু আইটেম ক্লিক (শুধুমাত্র প্রোফাইল লিংকের জন্য)
    document.getElementById('menuProfileLink').addEventListener('click', function(e) {
      e.preventDefault();
      switchModuleView('profile', this);
    });

    // সাব-মেনু আইটেম ক্লিকের ইভেন্ট লিসেনার
    document.querySelectorAll('.submenu-list .submenu-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation(); // ইভেন্ট বাবলিং ফিক্স
        switchModuleView(item.getAttribute('data-id'), item);
      });
    });

    profileTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      profileDropdown.style.display = profileDropdown.style.display === 'flex' ? 'none' : 'flex';
    });
    document.addEventListener('click', () => { profileDropdown.style.display = 'none'; });
    
    mobileMenuToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      sidebarNode.classList.toggle('active');
    });

    document.getElementById('openPassModalBtn').addEventListener('click', () => passwordChangeModal.style.display = 'flex');
    document.getElementById('closePassModalBtn').addEventListener('click', () => passwordChangeModal.style.display = 'none');
    
    document.getElementById('passwordUpdateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPass = document.getElementById('newPassword').value;
      if (newPass !== document.getElementById('confirmNewPassword').value) { alert("দুঃখিত, পাসওয়ার্ড মিলছে না!"); return; }
      try { 
        await updatePassword(auth.currentUser, newPass); 
        alert("🔒 পাসওয়ার্ড সফলভাবে আপডেট হয়েছে!"); 
        passwordChangeModal.style.display = 'none'; 
        document.getElementById('passwordUpdateForm').reset();
      } catch (err) { alert(err.message); }
    });

     // ফায়ারবেস রিয়েল-টাইম ডাটা সিংক্রোনাইজেশন লুপ
    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "../login.html"; return; }
      
      onSnapshot(doc(db, "users", user.uid), (snapshot) => {
        if (snapshot.exists()) {
          const memberData = snapshot.data();
          
          document.getElementById('topNavRole').innerText = (memberData.role || "MEMBER").toUpperCase();
          document.getElementById('topNavAvatar').src = memberData.photoUrl || '../placeholder.png';
          
          document.getElementById('dropMemberName').innerText = memberData.englishName || "সদস্য নাম";
          document.getElementById('dropMemberEmail').innerText = user.email;

          // প্রথমবার লোড হলে ডিফল্ট প্রোফাইল মডিউলটি অন হবে
          if(!spaContentRoot.hasChildNodes() || spaContentRoot.innerHTML.trim() === ""){
             switchModuleView('profile', document.getElementById('menuProfileLink'));
          }
        } else {
          alert("ডাটাবেজে আপনার সদস্য প্রোফাইল খুঁজে পাওয়া যায়নি!");
          signOut(auth);
        }
      });
    });

    document.getElementById('memberSignOutBtn').addEventListener('click', () => {
      if (confirm("আপনি কি নিশ্চিত যে এই সেশনটি শেষ করে লগআউট করতে চান?")) {
        signOut(auth).then(() => { window.location.href = "../login.html"; });
      }
    });
  </script>
</body>
</html>

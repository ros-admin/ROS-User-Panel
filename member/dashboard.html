<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROS Nexus - Member Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --cyber-bg: #030712; --glass-bg: rgba(17, 24, 39, 0.75); --glass-border: rgba(0, 180, 216, 0.2);
      --neon-blue: #00b4d8; --neon-green: #2ec4b6; --neon-yellow: #ffb703; --neon-red: #e63946;
      --text-main: #f3f4f6; --text-muted: #9ca3af;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', 'Orbitron', sans-serif; }
    body { background-color: var(--cyber-bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    
    .cyber-glass { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4); }
    
    /* হেডার নোড */
    .header-station { height: 60px; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--glass-border); }
    
    /* থ্রি-ডট মেনু বাটন */
    .three-dot-menu-btn { background: transparent; border: 1px solid var(--glass-border); color: var(--neon-blue); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 16px; }
    .three-dot-menu-btn:hover { background: rgba(0, 180, 216, 0.15); box-shadow: 0 0 10px var(--neon-blue); }

    .brand-title { font-family: 'Orbitron'; font-size: 18px; font-weight: 800; color: #fff; text-shadow: 0 0 10px rgba(0, 180, 216, 0.5); margin-left: 15px; flex: 1; }
    
    /* প্রোফাইল ড্রপডাউন ট্রিগার */
    .user-profile-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; position: relative; padding: 5px; border-radius: 50%; }
    .member-badge { font-size: 11px; color: var(--neon-green); font-weight: bold; text-transform: uppercase; border: 1px solid var(--glass-border); padding: 2px 8px; border-radius: 4px; background: rgba(46, 196, 182, 0.1); margin-right: 5px; }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon-blue); object-fit: cover; box-shadow: 0 0 10px rgba(0, 180, 216, 0.4); }
    
    /* ড্রপডাউন ডিজাইন */
    .profile-dropdown { position: absolute; top: 52px; right: 0; width: 230px; border-radius: 8px; padding: 10px 0; display: none; flex-direction: column; z-index: 1100; border: 1px solid var(--glass-border); }
    .dropdown-user-info { padding: 12px 20px; border-bottom: none; }
    .dropdown-user-info h4 { font-size: 14px; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
    .dropdown-user-info small { font-size: 11px; color: var(--text-muted); display: block; margin-top: 3px; word-break: break-all; margin-bottom: 10px; }
    
    .profile-dropdown .logout-btn { padding: 12px 20px; color: var(--neon-red); text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 10px; transition: 0.2s; border-top: 1px solid var(--glass-border); }
    .profile-dropdown .logout-btn:hover { background: rgba(230, 57, 70, 0.1); text-shadow: 0 0 8px var(--neon-red); }
    
    /* লেআউট ও সাইডবার ফ্রেমওয়ার্ক */
    .erp-wrapper { display: flex; flex: 1; margin-top: 60px; position: relative; }
    
    /* থ্রি-ডট দিয়ে কন্ট্রোলড সাইডবার */
    .sidebar-nav { width: 280px; height: calc(100vh - 60px); position: fixed; top: 60px; left: 0; z-index: 99; border-right: 1px solid var(--glass-border); transition: transform 0.4s cubic-bezier(0.075, 0.82, 0.165, 1); }
    .sidebar-nav.collapsed { transform: translateX(-280px); }
    
    .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid var(--glass-border); }
    .sidebar-header h2 { font-size: 15px; color: var(--neon-blue); font-family: 'Orbitron'; letter-spacing: 1px; }
    
    .sidebar-menu { list-style: none; padding: 15px 0; }
    .menu-item a { display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 600; border-left: 4px solid transparent; transition: all 0.3s ease; }
    .menu-item a:hover, .menu-item.active a { color: #fff; background: rgba(0, 180, 216, 0.08); border-left-color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
    
    /* কন্টেন্ট ওয়ার্কস্পেস */
    .main-content-node { margin-left: 280px; flex: 1; padding: 30px; min-height: calc(100vh - 60px); transition: margin-left 0.4s cubic-bezier(0.075, 0.82, 0.165, 1); }
    .main-content-node.expanded { margin-left: 0; }

    @media (max-width: 768px) {
      .sidebar-nav { transform: translateX(-280px); } 
      .sidebar-nav.active { transform: translateX(0); } 
      .main-content-node { margin-left: 0 !important; padding: 15px; }
    }
  </style>
</head>
<body>

  <header class="header-station cyber-glass">
    <button class="three-dot-menu-btn" id="threeDotMenuToggle" title="মেনু টগল">
      <i class="fas fa-ellipsis-v"></i>
    </button>
    
    <div class="brand-title">ROS NEXUS <span style="color: var(--neon-blue); font-weight: 300;">MEMBER</span></div>
    
    <div class="user-profile-trigger" id="profileTrigger">
      <span class="member-badge" id="topNavRole">লোড হচ্ছে...</span>
      <img src="../placeholder.png" class="user-avatar" id="topNavAvatar">
      
      <div class="profile-dropdown cyber-glass" id="profileDropdown">
        <div class="dropdown-user-info">
          <h4 id="dropMemberName">লোড হচ্ছে...</h4>
          <small id="dropMemberEmail">member@ros.org</small>
        </div>
        <a href="#" id="memberSignOutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> লগআউট করুন</a>
      </div>
    </div>
  </header>

  <div class="erp-wrapper">
    <aside class="sidebar-nav cyber-glass" id="sidebarNode">
      <div class="sidebar-header"><h2>MEMBER MATRIX</h2><small style="color: var(--text-muted); font-size: 10px;">SYSTEM EXECUTIVE</small></div>
      <ul class="sidebar-menu">
        <li class="menu-item active" id="menuProfileLink" data-id="profile"><a href="#"><i class="fas fa-user-circle"></i> <span>⚙️ প্রোফাইল</span></a></li>
        <li class="menu-item" id="menuUpdateInfoLink" data-id="updateInfo"><a href="#"><i class="fas fa-user-edit"></i> <span>📝 প্রোফাইলের তথ্য পরিবর্তন করুন</span></a></li>
        <li class="menu-item" id="menuAppLink" data-id="applications"><a href="#"><i class="fas fa-file-alt"></i> <span>📁 আমার আবেদন</span></a></li>
      </ul>
    </aside>

    <main class="main-content-node" id="spaContentRoot">
      </main>
  </div>

  <script src="../admin/profile.js"></script>

  <script type="module">
    import { db, auth } from '../firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ডোমেস্টিক এলিমেন্ট সিলেক্টর
    const threeDotMenuToggle = document.getElementById('threeDotMenuToggle');
    const sidebarNode = document.getElementById('sidebarNode');
    const spaContentRoot = document.getElementById('spaContentRoot');
    const profileTrigger = document.getElementById('profileTrigger');
    const profileDropdown = document.getElementById('profileDropdown');

    // ১. থ্রি-ডট মেনুবার স্লাইড এবং কলাপ্স টগল লজিক
    threeDotMenuToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      sidebarNode.classList.toggle('collapsed');
      spaContentRoot.classList.toggle('expanded');
      sidebarNode.classList.toggle('active');
    });

    // ২. প্রোফাইল ড্রপডাউন মেনু কন্ট্রোলার 
    profileTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      profileDropdown.style.display = profileDropdown.style.display === 'flex' ? 'none' : 'flex';
    });
    
    document.addEventListener('click', () => {
      profileDropdown.style.display = 'none';
      if(window.innerWidth <= 768) {
        sidebarNode.classList.remove('active');
      }
    });

    // ৩. সেন্ট্রাল ডাইনামিক রাউটার ইঞ্জিন (SPA মডিউল লোডার)
    function switchModuleView(moduleId, clickedLink) {
      // একটিভ মেনু হাইলাইট ক্লাস পরিবর্তন
      document.querySelectorAll('.sidebar-menu .menu-item').forEach(li => li.classList.remove('active'));
      if(clickedLink) clickedLink.classList.add('active');

      if(window.innerWidth <= 768) {
        sidebarNode.classList.remove('active');
      }

      // কন্টেন্ট রুট ফ্রেশ করা
      spaContentRoot.innerHTML = "";

      // কন্ডিশনাল মডিউল ফায়ারিং গেটওয়ে
      if (moduleId === 'profile') {
        // প্রোফাইল মডিউল রান করানো হলো
        loadProfileModule(spaContentRoot, db, auth, doc, onSnapshot, signOut);
      }



      
    }

    // সাইডবার ক্লিকের মাধ্যমে ডাইনামিক রাউটার ফায়ার করা
    document.querySelectorAll('.sidebar-menu .menu-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = item.getAttribute('data-id');
        switchModuleView(targetId, item);
      });
    });


    // ৪. ফায়ারবেস অথেনটিকেশন ও লাইভ ডাটাবেজ সিংক্রোনাইজেশন লুপ
    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "../login.html"; return; }
      
      onSnapshot(doc(db, "users", user.uid), (snapshot) => {
        if (snapshot.exists()) {
          const memberData = snapshot.data();
          
          // হেডার নোডে ডাটা বাইন্ডিং (মেম্বার ধরণ ও ছবি)
          document.getElementById('topNavRole').innerText = (memberData.role || "MEMBER").toUpperCase();
          document.getElementById('topNavAvatar').src = memberData.photoUrl || '../placeholder.png';
          
          // ড্রপডাউন নোডে নাম ও ইমেইল বাইন্ডিং
          document.getElementById('dropMemberName').innerText = memberData.englishName || "সদস্য নাম";
          document.getElementById('dropMemberEmail').innerText = user.email;

          // প্রথমবার পেজ লোড হলে অটোমেটিক প্রোফাইল মডিউল রেন্ডার করা
          if(!spaContentRoot.hasChildNodes() || spaContentRoot.innerHTML.trim() === ""){
             switchModuleView('profile', document.getElementById('menuProfileLink'));
          }

        } else {
          alert("ডাটাবেজে আপনার সদস্য প্রোফাইল খুঁজে পাওয়া যায়নি!");
          signOut(auth);
        }
      });
    });


    // ৫. লগআউট মডিউল লজিক
    document.getElementById('memberSignOutBtn').addEventListener('click', (e) => {
      e.preventDefault();
      if (confirm("আপনি কি নিশ্চিত যে এই সেশনটি শেষ করে লগআউট করতে চান?")) {
        signOut(auth).then(() => {
          window.location.href = "../login.html";
        }).catch((err) => {
          alert("লগআউট করতে সমস্যা হয়েছে: " + err.message);
        });
      }
    });
  </script>
</body>
</html>

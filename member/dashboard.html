<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROS Nexus - Enterprise Member ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Galada&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --cyber-bg: #030712; --glass-bg: rgba(17, 24, 39, 0.7); --glass-border: rgba(0, 180, 216, 0.2);
      --neon-blue: #00b4d8; --neon-green: #2ec4b6; --neon-yellow: #ffb703; --neon-red: #e63946;
      --text-main: #f3f4f6; --text-muted: #9ca3af;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', 'Orbitron', sans-serif; }
    body { background-color: var(--cyber-bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--cyber-bg); }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--neon-blue); }
    .cyber-glass { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
    .header-station { height: 60px; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--glass-border); }
    .brand-title { font-family: 'Orbitron'; font-size: 20px; font-weight: 800; letter-spacing: 2px; background: linear-gradient(to right, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; }
    .brand-title span { font-family: 'Galada', sans-serif; font-size: 14px; -webkit-text-fill-color: var(--neon-yellow); font-weight: 400; letter-spacing: 0; margin-top: 5px; }
    .mobile-menu-toggle { display: none; background: transparent; border: 1px solid var(--glass-border); color: var(--neon-blue); width: 38px; height: 38px; border-radius: 4px; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
    .mobile-menu-toggle:hover { background: rgba(0, 180, 216, 0.1); box-shadow: 0 0 10px var(--neon-blue); }
    .user-profile-trigger { display: flex; align-items: center; gap: 12px; cursor: pointer; position: relative; padding: 5px 10px; border-radius: 20px; border: 1px solid transparent; transition: 0.3s; }
    .user-profile-trigger:hover { border-color: var(--glass-border); background: rgba(255,255,255,0.02); }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--neon-blue); object-fit: cover; box-shadow: 0 0 10px rgba(0, 180, 216, 0.3); }
    .profile-dropdown { position: absolute; top: 52px; right: 0; width: 240px; border-radius: 8px; padding: 8px 0; display: none; flex-direction: column; z-index: 1100; border: 1px solid var(--glass-border); animation: dropSlide 0.3s ease; }
    @keyframes dropSlide { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    .dropdown-user-info { padding: 12px 16px; border-bottom: 1px solid var(--glass-border); margin-bottom: 4px; }
    .dropdown-user-info h4 { font-size: 14px; color: #fff; }
    .dropdown-user-info small { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; word-break: break-all; }
    .profile-dropdown a, .profile-dropdown button { padding: 10px 16px; color: var(--text-main); text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 10px; transition: 0.2s; background: transparent; border: none; width: 100%; text-align: left; cursor: pointer; }
    .profile-dropdown a:hover, .profile-dropdown button:hover { background: rgba(0, 180, 216, 0.1); color: var(--neon-blue); }
    .profile-dropdown .logout-btn { color: var(--neon-red); border-top: 1px solid var(--glass-border); margin-top: 4px; padding-top: 12px; }
    .profile-dropdown .logout-btn:hover { background: rgba(230, 57, 70, 0.1); color: var(--neon-red); }
    .erp-wrapper { display: flex; flex: 1; margin-top: 60px; position: relative; height: calc(100vh - 60px); }
    .sidebar-nav { width: 260px; height: 100%; border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; overflow-y: auto; }
    .sidebar-header { padding: 15px 20px; border-bottom: 1px solid var(--glass-border); font-family: 'Orbitron'; font-size: 11px; letter-spacing: 2px; color: var(--neon-blue); text-transform: uppercase; }
    .sidebar-menu { list-style: none; padding: 10px 0; flex: 1; }
    .menu-item { margin: 4px 10px; }
    .menu-item a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; transition: all 0.2s ease; border-left: 3px solid transparent; }
    .menu-item a:hover, .menu-item.active a { color: #fff; background: rgba(0, 180, 216, 0.08); border-left-color: var(--neon-blue); box-shadow: inset 5px 0 10px -5px rgba(0, 180, 216, 0.5); }
    .menu-item a i { width: 18px; text-align: center; font-size: 15px; color: var(--neon-blue); transition: 0.2s; }
    .menu-item a:hover i, .menu-item.active a i { transform: scale(1.1); text-shadow: 0 0 8px var(--neon-blue); }
    .main-content-node { flex: 1; padding: 25px; overflow-y: auto; position: relative; background: radial-gradient(circle at 50% 50%, rgba(17, 24, 39, 0.3) 0%, transparent 100%); }
    .member-badge { font-size: 11px; font-weight: 800; text-transform: uppercase; border: 1px solid rgba(46, 196, 182, 0.3); padding: 3px 10px; border-radius: 20px; background: rgba(46, 196, 182, 0.05); color: var(--neon-green); text-shadow: 0 0 5px rgba(46, 196, 182, 0.5); font-family: 'Orbitron'; }
    
    /* পাসওয়ার্ড মোডাল কাস্টম স্টাইল */
    .cyber-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .cyber-modal-card { width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; border: 1px solid var(--glass-border); box-shadow: 0 0 30px rgba(0, 180, 216, 0.2); position: relative; }
    .cyber-modal-card h3 { font-size: 18px; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; color: #fff; }
    .form-group-node { margin-bottom: 18px; }
    .form-group-node label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .form-input-node { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); padding: 10px 14px; border-radius: 6px; color: #fff; font-size: 14px; transition: 0.3s; }
    .form-input-node:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 180, 216, 0.3); outline: none; }
    .modal-action-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
    .cyber-btn { padding: 10px 20px; font-size: 13px; font-weight: 600; border: 1px solid transparent; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .cyber-btn-muted { background: transparent; border-color: var(--glass-border); color: var(--text-muted); }
    .cyber-btn-muted:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .cyber-btn-primary { background: rgba(0, 180, 216, 0.1); border-color: var(--neon-blue); color: var(--neon-blue); }
    .cyber-btn-primary:hover { background: var(--neon-blue); color: #030712; box-shadow: 0 0 15px var(--neon-blue); }

    @media (max-width: 992px) {
      .mobile-menu-toggle { display: flex; }
      .sidebar-nav { position: fixed; top: 60px; left: -260px; height: calc(100vh - 60px); z-index: 900; width: 260px; background: #030712; }
      .sidebar-nav.active { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
      .main-content-node { padding: 15px; }
    }
  </style>
</head>
<body>

  <header class="header-station cyber-glass">
    <div style="display: flex; align-items: center; gap: 15px;">
      <button class="mobile-menu-toggle" id="mobileMenuToggle">
        <i class="fas fa-ellipsis-v"></i>
      </button>
      <div class="brand-title">ROS NEXUS <span>কনসোল</span></div>
    </div>
    
    <div class="user-profile-trigger" id="profileTrigger">
      <span class="member-badge" id="topNavRole">MEMBER</span>
      <img src="../placeholder.png" class="user-avatar" id="topNavAvatar">
      
      <div class="profile-dropdown cyber-glass" id="profileDropdown">
        <div class="dropdown-user-info">
          <h4 id="dropMemberName">সদস্য নাম</h4>
          <small id="dropMemberEmail">member@ros.org</small>
        </div>
        <button id="openPassModalBtn"><i class="fas fa-key"></i> পাসওয়ার্ড পরিবর্তন</button>
        <button id="memberSignOutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> লগআউট করুন</button>
      </div>
    </div>
  </header>

  <div class="erp-wrapper">
    <aside class="sidebar-nav cyber-glass" id="sidebarNode">
      <div class="sidebar-header">MEMBER MATRIX</div>
      <ul class="sidebar-menu">
        <li class="menu-item active" id="menuProfileLink" data-id="profile"><a href="#"><i class="fas fa-user-circle"></i> প্রোফাইল</a></li>
        <li class="menu-item" id="menuUpdateInfoLink" data-id="updateInfo"><a href="#"><i class="fas fa-user-edit"></i> তথ্য পরিবর্তন</a></li>
        <li class="menu-item" id="menuAppLink" data-id="applications"><a href="#"><i class="fas fa-file-alt"></i> আমার আবেদন</a></li>
      </ul>
    </aside>

    <main class="main-content-node" id="spaContentRoot">
      </main>
  </div>

  <div class="cyber-modal-overlay" id="passwordChangeModal">
    <div class="cyber-modal-card cyber-glass">
      <h3>🔒 নিরাপত্তা পাসওয়ার্ড আপডেট</h3>
      <form id="passwordUpdateForm">
        <div class="form-group-node">
          <label>নতুন পাসওয়ার্ড লিখুন</label>
          <input type="password" id="newPassword" class="form-input-node" required minlength="6">
        </div>
        <div class="form-group-node">
          <label>নতুন পাসওয়ার্ড পুনরায় নিশ্চিত করুন</label>
          <input type="password" id="confirmNewPassword" class="form-input-node" required minlength="6">
        </div>
        <div class="modal-action-row">
          <button type="button" class="cyber-btn cyber-btn-muted" id="closePassModalBtn">বাতিল</button>
          <button type="submit" class="cyber-btn cyber-btn-primary">সংরক্ষণ করুন</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../member/profile.js"></script>

  <script type="module">
    import { db, auth } from '../firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const sidebarNode = document.getElementById('sidebarNode');
    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const spaContentRoot = document.getElementById('spaContentRoot');
    const profileTrigger = document.getElementById('profileTrigger');
    const profileDropdown = document.getElementById('profileDropdown');
    const passwordChangeModal = document.getElementById('passwordChangeModal');

    // ১. সেন্ট্রাল ডাইনামিক রাউটার ইঞ্জিন (SPA মডিউল লোডার)
    function switchModuleView(moduleId, clickedLink) {
      document.querySelectorAll('.sidebar-menu .menu-item').forEach(li => li.classList.remove('active'));
      if(clickedLink) clickedLink.classList.add('active');

      // মোবাইল স্ক্রিনে সাইডবার অটো অফ করা
      sidebarNode.classList.remove('active');
      spaContentRoot.innerHTML = "";

      if (moduleId === 'profile') {
        // এক্সটার্নাল প্রোফাইল মডিউল সফলভাবে ফায়ার করা হলো
        loadProfileModule(spaContentRoot, db, auth, doc, onSnapshot, signOut);
      }
      /* =======================================================
         🚩 [ভবিষ্যতের মডিউল ফাংশন এড করার জন্য মার্ক করা জায়গা]
         পরবর্তী মডিউল স্ক্রিপ্টগুলোর ফাংশন কল করার জন্য নিচের ব্লক ব্যবহার করুন:
         ======================================================= */
      else if (moduleId === 'updateInfo') {
        // উদাহরণ: loadUpdateInfoModule(spaContentRoot, db, auth, ...);
        spaContentRoot.innerHTML = `<div class="cyber-glass" style="padding:40px; text-align:center; border-radius:8px;"><h3>📝 প্রোফাইলের তথ্য পরিবর্তন মডিউল স্ট্যান্ডবাই</h3></div>`;
      }
      else if (moduleId === 'applications') {
        // উদাহরণ: loadApplicationsModule(spaContentRoot, db, auth, ...);
        spaContentRoot.innerHTML = `<div class="cyber-glass" style="padding:40px; text-align:center; border-radius:8px;"><h3>📁 আমার আবেদন মডিউল স্ট্যান্ডবাই</h3></div>`;
      }
      /* =======================================================
         🚩 [মার্কিং শেষ]
         ======================================================= */
    }

    // সাইডবার ক্লিকের মাধ্যমে ডাইনামিক রাউটার ফায়ার করা
    document.querySelectorAll('.sidebar-menu .menu-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = item.getAttribute('data-id');
        switchModuleView(targetId, item);
      });
    });

    // ২. প্রোফাইল ড্রপডাউন টগল কন্ট্রোল
    profileTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      profileDropdown.style.display = profileDropdown.style.display === 'flex' ? 'none' : 'flex';
    });
    document.addEventListener('click', () => { profileDropdown.style.display = 'none'; });
    
    // ৩. মোবাইল থ্রি-ডট মেনুবার টগল কন্ট্রোল
    mobileMenuToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      sidebarNode.classList.toggle('active');
    });

    // ৪. পাসওয়ার্ড মোডাল ওপেন/ক্লোজ ট্রিগার
    document.getElementById('openPassModalBtn').addEventListener('click', () => passwordChangeModal.style.display = 'flex');
    document.getElementById('closePassModalBtn').addEventListener('click', () => passwordChangeModal.style.display = 'none');
    
    // ৫. পাসওয়ার্ড ফায়ারবেস আপডেট সাবমিশন হ্যান্ডলার
    document.getElementById('passwordUpdateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPass = document.getElementById('newPassword').value;
      if (newPass !== document.getElementById('confirmNewPassword').value) { alert("দুঃখিত, পাসওয়ার্ড মিলছে না!"); return; }
      try { 
        await updatePassword(auth.currentUser, newPass); 
        alert("🔒 পাসওয়ার্ড সফলভাবে আপডেট হয়েছে!"); 
        passwordChangeModal.style.display = 'none'; 
        document.getElementById('passwordUpdateForm').reset();
      } catch (err) { alert(err.message); }
    });

    // ৬. ফায়ারবেস অথেনটিকেশন ও লাইভ ডাটাবেজ সিংক্রোনাইজেশন লুপ
    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "../login.html"; return; }
      
      onSnapshot(doc(db, "users", user.uid), (snapshot) => {
        if (snapshot.exists()) {
          const memberData = snapshot.data();
          
          // হেডার নোডে ডাটা বাইন্ডিং 
          document.getElementById('topNavRole').innerText = (memberData.role || "MEMBER").toUpperCase();
          document.getElementById('topNavAvatar').src = memberData.photoUrl || '../placeholder.png';
          
          // ড্রপডাউন নোডে নাম ও ইমেইল বাইন্ডিং
          document.getElementById('dropMemberName').innerText = memberData.englishName || "সদস্য নাম";
          document.getElementById('dropMemberEmail').innerText = user.email;

          // প্রথমবার পেজ লোড হলে অটোমেটিক প্রোফাইল মডিউল রেন্ডার করা
          if(!spaContentRoot.hasChildNodes() || spaContentRoot.innerHTML.trim() === ""){
             switchModuleView('profile', document.getElementById('menuProfileLink'));
          }

        } else {
          alert("ডাটাবেজে আপনার সদস্য প্রোফাইল খুঁজে পাওয়া যায়নি!");
          signOut(auth);
        }
      });
    });

    // ৭. ১০০% ওয়ার্কিং লগআউট মডিউল লজিক
    document.getElementById('memberSignOutBtn').addEventListener('click', () => {
      if (confirm("আপনি কি নিশ্চিত যে এই সেশনটি শেষ করে লগআউট করতে চান?")) {
        signOut(auth).then(() => {
          window.location.href = "../login.html";
        }).catch((err) => {
          alert("লগআউট করতে সমস্যা হয়েছে: " + err.message);
        });
      }
    });
  </script>
</body>
</html>
